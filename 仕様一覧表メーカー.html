<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外部・内部仕様一覧表メーカー</title>
<style>
  :root{
    --green:#d7e9c9; --green-line:#9cc27a; --ink:#222; --line:#bbb;
    --decide:#e8f3dc; --decide-line:#5a9c2e; --bg:#f4f5f2;
  }
  *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{margin:0;font-family:"Meiryo","Hiragino Kaku Gothic ProN",sans-serif;color:var(--ink);background:var(--bg);font-size:13px;}

  /* ===== ツールバー ===== */
  #toolbar{position:sticky;top:0;z-index:50;background:#2f3e2f;color:#fff;
    display:flex;gap:8px;align-items:center;padding:8px 14px;flex-wrap:wrap;}
  #toolbar h1{font-size:15px;margin:0 14px 0 0;font-weight:bold;}
  #toolbar button{font-size:13px;padding:6px 12px;border:0;border-radius:5px;cursor:pointer;background:#5a8a3c;color:#fff;}
  #toolbar button:hover{background:#6fa64a;}
  #toolbar button.ghost{background:#52614f;}
  #toolbar .spacer{flex:1;}
  #toolbar .tab{background:#52614f;}
  #toolbar .tab.active{background:#9cc27a;color:#23331e;font-weight:bold;}
  #toolbar .doc{background:#3b4a5c;border:1px solid #5b6c80;}
  #toolbar .doc.active{background:#e8eef5;color:#22303f;font-weight:bold;border-color:#e8eef5;}

  /* 建具表エディタ */
  .dcard{border:1px solid #ddd;border-radius:6px;padding:8px 10px;margin-bottom:8px;background:#fafafa;}
  .dhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .dhead .dno{font-weight:bold;color:#3b4a5c;}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 8px;}
  .dgrid .f{display:flex;flex-direction:column;gap:2px;}
  .dgrid .f.full{grid-column:1 / -1;}
  .dgrid .f label{font-size:10px;color:#777;}
  .dgrid .f input{padding:4px 6px;border:1px solid #ccc;border-radius:4px;font-size:12px;font-family:inherit;}
  .btn-sm{font-size:12px;padding:4px 12px;border:0;border-radius:4px;cursor:pointer;background:#5a8a3c;color:#fff;}
  .btn-del{background:#c0563f;padding:2px 9px;}
  .addrow{text-align:center;margin:6px 0 14px;}
  .dthumb{width:34px;height:34px;border:1px solid #00000022;border-radius:4px;background-color:#f3f3f3;flex-shrink:0;}
  /* クロス品番：画像サムネイルグリッド（カタログから選択） */
  .cloth-thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:4px;max-height:230px;overflow-y:auto;padding:5px;border:1px solid #ccc;border-radius:5px;background:#fafafa;}
  .cloth-thumb{cursor:pointer;border:2px solid transparent;border-radius:4px;padding:3px;background:#fff;text-align:center;transition:.08s;}
  .cloth-thumb:hover{border-color:#9cc27a;background:#f6fbef;}
  .cloth-thumb.selected{border-color:#3a7a17;background:#e3f2d6;}
  .cloth-thumb-img{width:100%;aspect-ratio:1/1;background:#f3f3f3;background-size:cover;background-position:center;border-radius:2px;border:1px solid #00000010;}
  .cloth-thumb-hb{font-size:10px;color:#222;margin-top:3px;line-height:1.15;font-weight:600;word-break:keep-all;}
  /* 廃番DBステータスバッジ（サムネイル右上にオーバーレイ） */
  .cloth-thumb{position:relative;}
  .cloth-thumb-badge{position:absolute;top:3px;right:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:9px;line-height:1.2;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .cloth-thumb-badge.haiban{background:#c0392b;}
  .cloth-thumb-badge.partial{background:#e67e22;}
  .cloth-thumb-badge.active{background:#27ae60;}
  .cloth-thumb-badge.unknown{background:#95a5a6;}
  .cloth-thumb.haiban .cloth-thumb-img{filter:grayscale(0.5) opacity(0.6);}
  .cloth-thumb.haiban .cloth-thumb-hb{text-decoration:line-through;color:#888;}

  /* 建具表 印刷シート */
  .tg-floor-title{background:#3b4a5c;color:#fff;padding:3px 10px;font-weight:bold;font-size:14px;border-radius:3px;margin:14px 0 5px;}
  table.tg-table{width:100%;border-collapse:collapse;margin:4px 0 8px;}
  table.tg-table th,table.tg-table td{border:1px solid #888;padding:3px 5px;font-size:11px;vertical-align:middle;text-align:center;}
  table.tg-table th{background:#eef2f6;color:#2a3744;}
  table.tg-table td.l{text-align:left;}
  table.tg-table .di{width:42px;height:42px;background-color:#f3f3f3;border:1px solid #00000018;border-radius:3px;margin:0 auto;}
  /* 建具カード（印刷シート） */
  .tg-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:4px 0 10px;}
  .tg-card{border:1px solid #888;border-radius:4px;overflow:hidden;break-inside:avoid;page-break-inside:avoid;background:#fff;}
  .tg-card-head{display:flex;background:#3b4a5c;color:#fff;font-weight:bold;font-size:12px;}
  .tg-card-head .no{padding:3px 8px;border-right:1px solid #ffffff55;min-width:62px;}
  .tg-card-head .room{padding:3px 8px;flex:1;}
  .tg-card-body{display:flex;border-bottom:1px solid #888;}
  /* 建具画像はカード高さに左右されず一定サイズに固定（100×100）。枠線・縦伸びは外側wrapで担保 */
  .tg-card-img-wrap{width:112px;flex-shrink:0;align-self:stretch;border-right:1px solid #888;background:#fff;display:flex;align-items:center;justify-content:center;padding:4px;}
  .tg-card-img{width:100px;height:100px;background-color:#f3f3f3;border-radius:3px;}
  /* 把手デザインなど長い日本語値が縦書き化しないように改行制御 */
  .tg-card .row .k{word-break:keep-all;}
  .tg-card .row .v{word-break:normal;overflow-wrap:anywhere;line-height:1.35;min-width:0;}
  .tg-card-attrs{flex:1;display:flex;flex-direction:column;}
  .tg-card-attrs .row{display:flex;border-bottom:1px dotted #bbb;font-size:11px;}
  .tg-card-attrs .note{padding:3px 6px;font-size:10px;color:#b0734a;background:#fff7f0;margin-top:auto;}
  .tg-card .row .k{width:92px;flex-shrink:0;background:#eef2f6;color:#2a3744;padding:3px 5px;border-right:1px solid #ddd;font-size:11px;}
  .tg-card .row .v{padding:3px 6px;font-weight:bold;font-size:11px;flex:1;display:flex;align-items:center;gap:6px;}
  .tg-card .row .v .acc-img{display:inline-block;width:28px;height:28px;background-color:#f3f3f3;border:1px solid #00000018;border-radius:3px;flex-shrink:0;}
  .tg-card-spec .row{display:flex;border-bottom:1px solid #ccc;}
  .tg-card-spec .row:last-child{border-bottom:0;}
  .planimg{max-width:100%;max-height:360px;border:1px solid #bbb;border-radius:4px;margin:6px 0;display:block;}
  /* 階ごとの A3横ページ（左:間取り図＋仕様／右:建具カード） */
  .tg-floor-page{display:grid;grid-template-columns:0.85fr 1fr;gap:6mm;margin-top:10px;align-items:start;}
  .tg-floor-page + .tg-floor-page{page-break-before:always;margin-top:0;}
  /* 画面プレビューでは「全建具が一覧で見やすい」レイアウトに切替（印刷は上のグリッドを維持） */
  @media screen {
    #sheet.tategu-mode .tg-floor-page{display:block;margin-top:18px;}
    #sheet.tategu-mode .tg-floor-page + .tg-floor-page{margin-top:22px;border-top:2px dashed #aaa;padding-top:18px;}
    #sheet.tategu-mode .tg-floor-left{display:grid;grid-template-columns:340px 1fr 1fr;gap:10px;align-items:start;margin-bottom:10px;}
    #sheet.tategu-mode .tg-floor-plan{height:auto;min-height:220px;}
    #sheet.tategu-mode .tg-floor-col{margin-top:6px;}
    #sheet.tategu-mode .tg-cards{grid-template-columns:repeat(auto-fill, minmax(min(340px, 100%), 1fr));}
  }
  .tg-floor-left{display:flex;flex-direction:column;gap:5mm;}
  .tg-floor-plan{display:flex;flex-direction:column;border:1px solid #888;border-radius:4px;overflow:hidden;background:#fff;height:130mm;}
  .tg-floor-plan .ph{background:#3b4a5c;color:#fff;padding:3px 10px;font-weight:bold;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .tg-floor-plan .pbody{flex:1;display:flex;align-items:center;justify-content:center;padding:3mm;background:#fafaf6;min-height:0;}
  .tg-floor-plan .pbody img{max-width:100%;max-height:100%;object-fit:contain;}
  .tg-floor-plan .empty{color:#999;font-size:12px;text-align:center;line-height:1.6;}
  .tg-floor-col{display:flex;flex-direction:column;}
  .tg-floor-col .tg-floor-title{margin:0 0 5px;}
  .tg-floor-col .tg-cards{margin:0;}
  /* 各階ページ内の 建具仕様（共通）／床仕様 はコンパクト表示 */
  .tg-floor-left .sec{margin-bottom:0;}
  .tg-floor-left .sec-h{padding:3px 8px;font-size:12px;}
  .tg-floor-left .sec-b{padding:4px 8px;}
  .tg-floor-left .kv{font-size:11px;padding:2px 0;}
  .tg-floor-left .kv .k{width:120px;}

  /* ===== クロス図面：階ごと A3横ページ ===== */
  .kr-floor-page{display:grid;grid-template-columns:0.85fr 1fr;gap:6mm;margin-top:10px;align-items:start;}
  .kr-floor-page + .kr-floor-page{page-break-before:always;margin-top:0;}
  .kr-floor-left{display:flex;flex-direction:column;gap:5mm;}
  .kr-floor-plan{display:flex;flex-direction:column;border:1px solid #888;border-radius:4px;overflow:hidden;background:#fff;height:160mm;}
  .kr-floor-plan .ph{background:#3b4a5c;color:#fff;padding:3px 10px;font-weight:bold;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .kr-floor-plan .pbody{flex:1;display:flex;align-items:center;justify-content:center;padding:3mm;background:#fafaf6;min-height:0;}
  .kr-floor-plan .pbody img{max-width:100%;max-height:100%;object-fit:contain;}
  .kr-floor-plan .empty{color:#999;font-size:12px;text-align:center;line-height:1.6;}
  .kr-floor-col{display:flex;flex-direction:column;}
  .kr-floor-title{background:#3b4a5c;color:#fff;padding:3px 10px;font-weight:bold;font-size:14px;border-radius:3px;margin:0 0 6px;}
  .kr-meta{margin-top:8px;padding:6px 10px;border:1px solid #ccc;border-radius:4px;background:#f8f8f5;}
  .kr-meta .row{display:flex;font-size:11px;padding:1px 0;}
  .kr-meta .row .k{width:110px;color:#555;}
  .kr-meta .row .v{font-weight:bold;color:#222;}
  .kr-meta .note{color:#777;font-size:10px;margin-top:4px;line-height:1.5;}
  /* クロスカード */
  .kr-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .kr-card{border:1px solid #888;border-radius:4px;overflow:hidden;background:#fff;break-inside:avoid;page-break-inside:avoid;display:flex;flex-direction:column;}
  .kr-card-head{display:flex;justify-content:space-between;align-items:center;background:#3b4a5c;color:#fff;padding:3px 8px;font-size:11px;font-weight:bold;}
  .kr-card-head .part{font-weight:normal;font-size:10px;background:rgba(255,255,255,.18);padding:1px 6px;border-radius:2px;}
  .kr-card-style{padding:3px 6px;text-align:center;font-size:11px;font-weight:bold;color:#b0734a;background:#fff7f0;border-bottom:1px solid #f0e0d0;}
  .kr-card-img{height:90px;background-color:#fff;border-bottom:1px solid #ddd;}
  .kr-card-foot{padding:4px 6px;text-align:center;font-size:11px;font-weight:bold;color:#222;}
  /* 画面プレビュー：kurosu-modeで階ページを縦積み・カード幅を枠追従に */
  @media screen {
    #sheet.kurosu-mode .kr-floor-page{display:block;margin-top:18px;}
    #sheet.kurosu-mode .kr-floor-page + .kr-floor-page{margin-top:22px;border-top:2px dashed #aaa;padding-top:18px;}
    #sheet.kurosu-mode .kr-floor-left{display:grid;grid-template-columns:340px 1fr;gap:10px;align-items:start;margin-bottom:10px;}
    #sheet.kurosu-mode .kr-floor-plan{height:auto;min-height:220px;}
    #sheet.kurosu-mode .kr-cards{grid-template-columns:repeat(auto-fill, minmax(min(200px, 100%), 1fr));}
  }

  /* ===== 照明図面（商品カタログ式） ===== */
  .lt-floor-title{background:#3b4a5c;color:#fff;padding:4px 12px;font-weight:bold;font-size:14px;border-radius:3px;margin:14px 0 8px;}
  /* お客様出し（大きく目立たせる） */
  .lt-grand{display:flex;align-items:center;justify-content:space-between;border:2px solid #a26a1f;background:#fffaee;border-radius:6px;padding:8px 14px;margin:12px 0;}
  .lt-grand-label{font-size:13px;font-weight:bold;color:#a26a1f;}
  .lt-grand-yen{font-size:22px;font-weight:bold;color:#222;letter-spacing:1px;}
  /* 照明カード（商品画像内の品番・スペックも読めるサイズ） */
  .lt-cards{display:grid;grid-template-columns:repeat(auto-fill, minmax(380px,1fr));gap:8px;}
  .lt-card{border:1px solid #888;border-radius:4px;overflow:hidden;background:#fff;break-inside:avoid;page-break-inside:avoid;display:flex;flex-direction:column;}
  .lt-card-head{display:flex;justify-content:space-between;align-items:center;background:#3b4a5c;color:#fff;padding:5px 10px;font-size:13px;font-weight:bold;}
  .lt-card-head .qty{background:#f5b342;color:#1a1a1a;padding:2px 8px;border-radius:9px;font-size:12px;}
  .lt-card-img{height:280px;background-color:#fff;border-bottom:1px solid #ddd;}
  .lt-card-body{padding:6px 10px;font-size:11px;line-height:1.5;}
  .lt-card-body .name{font-weight:bold;font-size:12px;color:#222;}
  .lt-card-body .meta{color:#555;margin-top:2px;}
  .lt-card-body .hb{color:#1a4a7a;font-weight:bold;}
  /* 集計表 */
  .lt-sum{margin-top:10px;border:1px solid #888;border-radius:4px;overflow:hidden;}
  .lt-sum-h{background:#a26a1f;color:#fff;padding:4px 10px;font-weight:bold;font-size:13px;}
  table.lt-sum-table{width:100%;border-collapse:collapse;font-size:11px;}
  table.lt-sum-table th,table.lt-sum-table td{border:1px solid #888;padding:3px 6px;text-align:center;vertical-align:middle;}
  table.lt-sum-table th{background:#eef2f6;color:#2a3744;font-weight:bold;}
  table.lt-sum-table td.l{text-align:left;}
  table.lt-sum-table td.total{background:#fff7e0;font-weight:bold;}
  /* 画面プレビューではカード幅を枠追従に（商品画像内の品番が読める380px～） */
  @media screen {
    .lighting-mode .lt-cards{grid-template-columns:repeat(auto-fill, minmax(min(380px, 100%), 1fr));}
  }

  .wrap{display:flex;gap:0;}
  #editor{width:46%;min-width:380px;padding:14px;overflow:auto;}
  #previewWrap{flex:1;padding:14px;overflow:auto;background:#e7e9e4;}

  /* ===== 編集パネル ===== */
  .card{background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;overflow:hidden;}
  .card>summary{cursor:pointer;padding:9px 12px;font-weight:bold;background:#eef3e9;
    border-bottom:1px solid #e0e6da;list-style:none;display:flex;align-items:center;gap:8px;}
  .card>summary::-webkit-details-marker{display:none;}
  .card>summary .area{font-size:11px;background:#5a8a3c;color:#fff;padding:1px 7px;border-radius:10px;}
  .card .body{padding:10px 12px;}
  .field{display:flex;align-items:center;gap:8px;margin:6px 0;}
  .field label{width:130px;color:#555;font-size:12px;flex-shrink:0;}
  .field input,.field select,.field textarea{flex:1;padding:5px 7px;border:1px solid #ccc;border-radius:5px;font-size:13px;font-family:inherit;}
  .hint{font-size:11px;color:#888;margin:2px 0 8px;}
  .choices{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .choice{border:2px solid #ddd;border-radius:8px;padding:8px;width:calc(50% - 4px);cursor:pointer;background:#fafafa;position:relative;transition:.1s;}
  .choice:hover{border-color:var(--green-line);}
  .choice.on{border-color:var(--decide-line);background:var(--decide);}
  .choice .sw{height:34px;border-radius:5px;border:1px solid #00000022;margin-bottom:6px;}
  .choice .nm{font-size:12px;font-weight:bold;}
  .choice .sub{font-size:11px;color:#666;}
  .choice .badge{position:absolute;top:-9px;right:-7px;background:var(--decide-line);color:#fff;
    font-size:10px;padding:1px 6px;border-radius:9px;display:none;}
  .choice.on .badge{display:block;}
  .secmeta{font-size:11px;color:#999;margin-top:8px;}
  .comp{margin-top:5px;font-size:11px;font-weight:bold;border-radius:4px;padding:2px 5px;}
  .comp.ok{background:#e3f2d6;color:#3a7a17;}
  .comp.ng{background:#fbe0e0;color:#b32424;}
  .comp .mz{font-weight:normal;color:#666;margin-left:4px;}
  .regcard .body{background:#fffdf5;}
  .reg-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:5px 0;}
  .reg-row .n{font-size:12px;color:#555;}
  .reg-row input[type=number]{width:58px;padding:4px;border:1px solid #ccc;border-radius:4px;}
  .reglink{font-size:11px;}
  .toggle{display:inline-flex;}
  .tg{border:1px solid #bbb;background:#fff;padding:4px 16px;cursor:pointer;font-size:13px;}
  .tg:first-child{border-radius:5px 0 0 5px;}
  .tg:last-child{border-radius:0 5px 5px 0;border-left:0;}
  .tg.on{background:#5a8a3c;color:#fff;border-color:#5a8a3c;}
  .tg.on.no{background:#b0734a;border-color:#b0734a;}
  .optoff{opacity:.4;pointer-events:none;}

  /* ===== プレビュー（印刷シート） ===== */
  #sheet{background:#fff;width:980px;margin:0 auto;padding:22px 26px;box-shadow:0 2px 10px #0003;}
  /* 仕様一覧表以外のモードはプレビュー枠に追従（max 1400px）。印刷時は @page で実寸 */
  #sheet.tategu-mode,
  #sheet.kurosu-mode,
  .lighting-mode,
  .wiring-mode,
  #sheet.harimake-mode{width:auto;max-width:1400px;padding:18px 22px;}
  .sheet-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #2f3e2f;padding-bottom:8px;margin-bottom:10px;}
  .sheet-head .title{font-size:22px;font-weight:bold;letter-spacing:2px;}
  .sheet-head .proj{font-size:19px;font-weight:bold;margin-top:4px;color:#1a4a7a;}
  .sheet-head .meta{font-size:11px;color:#555;text-align:right;line-height:1.6;}
  .areaTitle{background:#2f3e2f;color:#fff;font-weight:bold;padding:4px 10px;margin:14px 0 6px;font-size:14px;border-radius:3px;}
  table.spec{width:100%;border-collapse:collapse;margin-bottom:8px;}
  table.spec th,table.spec td{border:1px solid #999;padding:4px 7px;font-size:12px;vertical-align:middle;}
  table.spec th{background:#eef3e9;width:150px;text-align:left;color:#333;font-weight:bold;}
  .sec{border:1px solid #888;border-radius:4px;margin-bottom:10px;overflow:hidden;page-break-inside:avoid;}
  .sec-h{background:#d7e9c9;border-bottom:1px solid #9cc27a;padding:5px 10px;font-weight:bold;font-size:13px;}
  .sec-b{padding:8px 10px;}
  .kv{display:flex;font-size:12px;border-bottom:1px dotted #ccc;padding:3px 0;}
  .kv .k{width:170px;color:#555;flex-shrink:0;}
  .kv .v{font-weight:bold;}
  .decided-box{display:flex;align-items:center;gap:12px;background:var(--decide);border:1.5px solid var(--decide-line);border-radius:6px;padding:8px 10px;margin-top:8px;}
  .decided-box .sw{width:46px;height:46px;border-radius:5px;border:1px solid #00000022;flex-shrink:0;}
  .decided-box .dsw{width:98px;height:76px;border-radius:5px;border:1px solid #00000022;flex-shrink:0;background-color:#f3f3f3;}
  .decided-box .dinfo{flex:1;}
  .decided-box .label{font-size:10px;color:var(--decide-line);font-weight:bold;}
  .decided-box .nm{font-size:14px;font-weight:bold;}
  .decided-box .det{font-size:11px;color:#444;margin-top:2px;}
  .decided-box .none{color:#999;font-style:italic;}
  .cands{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .cand{border:1px solid #bbb;border-radius:5px;padding:5px;width:112px;position:relative;background:#fff;page-break-inside:avoid;}
  .cand.on{border:2px solid var(--decide-line);background:var(--decide);}
  .cand .csw{height:84px;border:1px solid #00000018;border-radius:3px;}
  .cand .cnm{font-size:10px;font-weight:bold;margin-top:4px;line-height:1.25;}
  .cand .cdet{font-size:9px;color:#555;line-height:1.25;margin-top:1px;}
  .cand .cbadge{position:absolute;top:-8px;right:-6px;background:var(--decide-line);color:#fff;font-size:9px;font-weight:bold;padding:1px 7px;border-radius:9px;}
  .cstamp{font-size:9px;padding:0 4px;border-radius:3px;font-weight:bold;}
  .cstamp.ok{background:#e3f2d6;color:#3a7a17;}
  .cstamp.ng{background:#fbe0e0;color:#b32424;}
  .undecided{font-size:11px;color:#b07a00;font-weight:bold;margin-top:6px;}
  .sign{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:18px;border-top:2px solid #2f3e2f;padding-top:10px;}
  .sign .box{border:1px solid #999;border-radius:4px;min-height:70px;padding:5px 8px;font-size:11px;color:#555;}
  .sign .box b{display:block;margin-bottom:4px;color:#222;}
  .foot{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:10px;border-top:1px solid #ccc;padding-top:6px;}
  .note{font-size:10px;color:#777;margin-top:6px;}
  .stamp{display:inline-block;margin-left:10px;font-size:11px;font-weight:bold;padding:1px 8px;border-radius:4px;border:1.5px solid;vertical-align:middle;}
  .stamp.ok{color:#3a7a17;border-color:#3a7a17;background:#eef7e6;}
  .stamp.ng{color:#b32424;border-color:#b32424;background:#fbecec;}
  .warnbar{background:#fbe0e0;border:1.5px solid #b32424;color:#8a1c1c;padding:7px 11px;border-radius:5px;font-size:12px;margin-bottom:10px;font-weight:bold;}
  .regline{font-size:10px;color:#666;margin:2px 0 8px;}

  /* ===== 印刷 ===== */
  @media print{
    #toolbar,#editor{display:none!important;}
    body{background:#fff;}
    #previewWrap{padding:0;background:#fff;overflow:visible;}
    /* ページ余白を最小限に。@page margin を 0 にして、sheet 側 padding 5mm（左右均等）で
       物理印刷マージンを確保。これでブラウザ印刷ダイアログの『余白』設定がどれでも
       左右対称な余白になる。
       ★重要：画面プレビュー用の max-width:1400px が印刷時にも効くと、A3横幅に対して
       右側に余白が出るため、印刷時は max-width を完全に解除して紙幅いっぱい使う。
       各モードクラスの詳細度が #sheet 単独より高いため、各モードに明示で解除指定。 */
    body{margin:0!important;}
    #previewWrap{margin:0!important;}
    #sheet,
    #sheet.spec-mode,
    #sheet.tategu-mode,
    #sheet.kurosu-mode,
    .lighting-mode,
    .wiring-mode,
    #sheet.harimake-mode{width:auto!important;max-width:none!important;box-shadow:none;margin:0!important;padding:5mm!important;}
    @page{size:A3 landscape;margin:0;}
    /* 照明・配線・貼り分けシート全体を flex column にして、最後の子（フッター枠）が
       A3 ページの最下部に固定されるようにする。複数階・複数テーブルあっても、
       メインコンテンツが flex 伸びてフッターが下に張り付く。 */
    .lighting-mode,
    .wiring-mode,
    #sheet.harimake-mode{display:flex!important;flex-direction:column!important;min-height:283mm!important;}
    .lighting-mode > .proj-footer,
    .wiring-mode > .proj-footer,
    #sheet.harimake-mode > .proj-footer{margin-top:auto!important;}
    /* === 仕様一覧表（spec モード）：A3横で読みやすい2列レイアウト === */
    /* 現場の人が見ながら作業するため、フォント読みやすさ優先 */
    /* 1枚目=外部、2枚目=内部 で綺麗に分割。各area-block 内で2列グリッド */
    #sheet.spec-mode{display:block;}
    /* area-block 全体に break-inside:avoid を付けるとブラウザが『丸ごと次ページに送ろう』
       として上に大きな空白ができてしまうので外す。代わりに各 .sec（セクションカード）
       単位で分割を避けるだけにする。 */
    /* === A3横 1枚目=外部、2枚目=内部 を想定したサイズ感（文字大きめ・余白広め） === */
    #sheet.spec-mode .sec{break-inside:avoid;page-break-inside:avoid;}
    #sheet.spec-mode .sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:6mm 9mm;margin-top:2mm;}
    #sheet.spec-mode .sheet-head{margin-bottom:4mm;padding-bottom:7px;}
    #sheet.spec-mode .sheet-head .title{font-size:24px;letter-spacing:1.8px;}
    #sheet.spec-mode .sheet-head .proj{font-size:21px;margin-top:4px;}
    #sheet.spec-mode .sheet-head .meta{font-size:12px;line-height:1.55;}
    #sheet.spec-mode .regline{font-size:11.5px;margin:2mm 0 3.5mm;}
    #sheet.spec-mode .areaTitle{margin:5mm 0 3mm;padding:4px 12px;font-size:16px;}
    #sheet.spec-mode .sec{margin-bottom:4mm;}
    #sheet.spec-mode .sec-h{padding:5px 12px;font-size:14.5px;}
    #sheet.spec-mode .sec-b{padding:4.5mm 5mm;}
    #sheet.spec-mode .kv{font-size:12.5px;padding:3px 0;}
    #sheet.spec-mode .kv .k{width:120px;}
    #sheet.spec-mode .decided-box{padding:6px 10px;gap:10px;margin-top:5px;border-radius:5px;}
    #sheet.spec-mode .decided-box .dsw{width:72px;height:56px;}
    #sheet.spec-mode .decided-box .sw{width:50px;height:50px;}
    #sheet.spec-mode .decided-box .label{font-size:10.5px;}
    #sheet.spec-mode .decided-box .nm{font-size:15.5px;}
    #sheet.spec-mode .decided-box .det{font-size:12px;margin-top:2px;}
    #sheet.spec-mode .undecided{font-size:12.5px;margin-top:5px;}
    #sheet.spec-mode .warnbar{padding:6px 12px;font-size:12.5px;margin-bottom:3mm;}
    #sheet.spec-mode .sign{margin-top:6mm;padding-top:5mm;}
    #sheet.spec-mode .sign .box{min-height:22mm;padding:5px 9px;font-size:12px;}
    /* 各階を A3 1ページに広げる：tg-print-page が flex column で A3 縦サイズいっぱい使い、
       中身 tg-floor-page を flex:1 で伸ばす。最下部にフッター枠が固定で来る。 */
    #sheet.tategu-mode .tg-print-page{display:flex!important;flex-direction:column!important;height:283mm!important;break-inside:avoid!important;page-break-inside:avoid!important;}
    #sheet.tategu-mode .tg-print-page > .tg-floor-page{flex:1!important;min-height:0!important;}
    /* === 建具表（tategu-mode）：A3 横向き、左カラムも大きく＆カードも横長に === */
    /* 左カラム比を 0.55fr に少し広げて間取り図＋仕様欄を大きく見せ、
       カード側は画像をさらに大きく（130x130）して attrs（縦5行）と高さを揃え、
       カード内 padding を縮めて横長フィルムに見せる。 */
    #sheet.tategu-mode .tg-floor-page{grid-template-columns:0.55fr 1fr!important;gap:6mm!important;margin-top:5mm!important;align-items:start!important;}
    #sheet.tategu-mode .tg-cards{grid-template-columns:repeat(3,1fr)!important;gap:4mm!important;margin:3px 0 4mm!important;}
    #sheet.tategu-mode .tg-card-head{font-size:13.5px!important;}
    #sheet.tategu-mode .tg-card-head .no{padding:3px 9px;min-width:66px;}
    #sheet.tategu-mode .tg-card-head .room{padding:3px 9px;}
    #sheet.tategu-mode .tg-card-img-wrap{width:112px;padding:5px;}
    #sheet.tategu-mode .tg-card-img{width:102px;height:102px;}
    #sheet.tategu-mode .tg-card-attrs .row{font-size:12px;}
    /* attrs の k 幅は spec とは別に小さくして、右の v に幅を残す（『SH型』等が1行で入る） */
    #sheet.tategu-mode .tg-card-attrs .row .k{width:72px!important;padding:3px 5px;font-size:11px;}
    #sheet.tategu-mode .tg-card-attrs .row .v{padding:3px 6px;font-size:12px;}
    #sheet.tategu-mode .tg-card-attrs .note{padding:3px 6px;font-size:10.5px;}
    #sheet.tategu-mode .tg-card-spec .row{font-size:12.5px;}
    /* spec の k 幅もベース 92px の継承を上書きして狭める（『種類』『品番』『大きさ』は3-4文字） */
    #sheet.tategu-mode .tg-card-spec .row .k{width:64px!important;padding:4px 6px;font-size:12px;}
    #sheet.tategu-mode .tg-card-spec .row .v{padding:4px 7px;font-size:13px;}
    #sheet.tategu-mode .tg-card .row .v .acc-img{width:32px;height:32px;}
    #sheet.tategu-mode .tg-floor-title{font-size:14.5px!important;margin-bottom:4px!important;}
    /* 左カラム（仕様/床）も A3 サイズに見合うゆったりサイズに */
    #sheet.tategu-mode .tg-floor-left{gap:5mm!important;}
    #sheet.tategu-mode .tg-floor-left .sec-h{font-size:14px!important;padding:4px 10px!important;}
    #sheet.tategu-mode .tg-floor-left .sec-b{padding:5px 11px!important;}
    #sheet.tategu-mode .tg-floor-left .kv{font-size:12.5px!important;padding:2.5px 0!important;}
    /* 左カラム kv の k 幅も狭く（『ドア色』『キャッチャー』等は最長6文字） */
    #sheet.tategu-mode .tg-floor-left .kv .k{width:90px!important;}
    /* 間取り図は A3 ページ内の残りスペースを flex で目一杯使う（max-height 制限なし） */
    #sheet.tategu-mode .tg-floor-left{display:flex!important;flex-direction:column!important;}
    #sheet.tategu-mode .tg-floor-plan{height:auto!important;max-height:none!important;flex:1!important;min-height:60mm!important;}
    #sheet.tategu-mode .tg-floor-plan .ph{padding:4px 10px;font-size:13.5px;}
    #sheet.tategu-mode .tg-floor-plan .pbody{padding:2mm;}
    #sheet.tategu-mode .tg-floor-plan .pbody img{max-height:100%!important;max-width:100%!important;object-fit:contain;}
    /* === クロス図面（kurosu-mode）：A3 横向き＝左右半々レイアウトで間取り図をしっかり大きく === */
    /* 各階を A3 1ページに広げる：kr-print-page が flex column で A3 縦サイズいっぱい使い、
       中身 kr-floor-page を flex:1 で伸ばす。最下部にフッター枠が固定で来る。 */
    #sheet.kurosu-mode .kr-print-page{display:flex!important;flex-direction:column!important;height:283mm!important;break-inside:avoid!important;page-break-inside:avoid!important;}
    #sheet.kurosu-mode .kr-print-page > .kr-floor-page{flex:1!important;min-height:0!important;}
    #sheet.kurosu-mode .kr-floor-page{grid-template-columns:1fr 1fr!important;gap:6mm!important;margin-top:3mm!important;align-items:stretch!important;}
    #sheet.kurosu-mode .kr-floor-plan{height:auto!important;max-height:none!important;flex:1!important;}
    #sheet.kurosu-mode .kr-floor-left{display:flex!important;flex-direction:column!important;}
    #sheet.kurosu-mode .kr-floor-plan .ph{padding:4px 12px;font-size:14px;}
    #sheet.kurosu-mode .kr-floor-plan .pbody{padding:3mm;}
    #sheet.kurosu-mode .kr-floor-title{padding:5px 12px!important;font-size:15.5px!important;margin:0 0 5mm!important;}
    #sheet.kurosu-mode .kr-cards{grid-template-columns:repeat(3,1fr)!important;gap:4mm!important;}
    #sheet.kurosu-mode .kr-card-head{padding:5px 10px!important;font-size:13.5px!important;}
    #sheet.kurosu-mode .kr-card-head .part{font-size:11px!important;}
    #sheet.kurosu-mode .kr-card-style{padding:4px 8px!important;font-size:12.5px!important;}
    #sheet.kurosu-mode .kr-card-img{height:48mm!important;}
    #sheet.kurosu-mode .kr-card-foot{padding:5px 8px!important;font-size:13.5px!important;}
    #sheet.kurosu-mode .kr-meta{margin-top:5mm!important;padding:8px 14px!important;}
    #sheet.kurosu-mode .kr-meta .row{font-size:13px!important;padding:2px 0!important;}
    #sheet.kurosu-mode .kr-meta .row .k{width:125px!important;}
    #sheet.kurosu-mode .kr-meta .note{font-size:12px!important;margin-top:5px!important;line-height:1.6!important;}
    .wiring-mode{font-size:10px;}
    .wiring-mode .sheet-head{margin-bottom:1.5mm;padding-bottom:2px;}
    .wiring-mode .sheet-head .title{font-size:15px;}
    .wiring-mode .sheet-head .proj{font-size:15px;}
    .wiring-mode .sheet-head .meta{font-size:9px;line-height:1.3;}
    /* 坪数表・集計部・基本数量・追加配線の各テーブル。
       ★フッター枠の table（.proj-footer-tbl）はこの圧縮対象から除外して、
       各 td の inline style サイズ（物件名30px等）を尊重する。 */
    .wiring-mode table:not(.proj-footer-tbl){font-size:9px!important;margin-top:2px!important;}
    .wiring-mode table:not(.proj-footer-tbl) th{padding:1.5px 3px!important;font-size:8.5px!important;}
    .wiring-mode table:not(.proj-footer-tbl) td{padding:1.5px 3px!important;font-size:9px!important;line-height:1.3!important;}
    /* 坪数の根拠資料：A3 ではコンパクトに（小さくてOK） */
    .wiring-mode img[src^="data:image"]{max-height:13mm!important;}
    /* 集計部の ③ をやや大きく強調維持 */
    .wiring-mode table tr td[style*="font-size:17px"]{font-size:11px!important;}
    .wiring-mode table tr td[style*="font-size:14px"]{font-size:9.5px!important;}
    /* テーブル間の見出しバー（基本数量追加表／追加配線等 数量表）を縮める */
    .wiring-mode div[style*="background:#3b4a5c"][style*="padding:4px 12px"]{padding:1px 6px!important;font-size:10px!important;margin:3px 0 1px!important;}
    /* 坪数根拠資料の枠も圧縮 */
    .wiring-mode div[style*="background:#f8fafc"]{padding:2px 5px!important;margin-top:2px!important;}
    .wiring-mode div[style*="background:#f8fafc"] > div:first-child{font-size:9px!important;margin-bottom:1px!important;}
    /* テーブル行は1ページ内で行単位の改ページを許可（テーブル丸ごと送りで上に大空白ができるのを防ぐ） */
    .wiring-mode table{break-inside:auto!important;page-break-inside:auto!important;}
    .wiring-mode tr{break-inside:avoid!important;page-break-inside:avoid!important;}
    /* セクション見出し（追加配線等 数量表 など）が次ページに送られないよう、
       見出しと直後のテーブルを一緒に保持する */
    .wiring-mode div[style*="background:#3b4a5c"]{break-after:avoid!important;page-break-after:avoid!important;}
    /* 備考欄・hint・margin も縮める */
    .wiring-mode .hint{font-size:8px!important;}
    /* フッター・備考欄も省スペース化 */
    .wiring-mode .foot{font-size:8.5px!important;margin-top:3px!important;padding-top:2px!important;}

    /* 照明カードは A3 横で 8列×4行 = 32個 入るように小さく整える（lighting-mode のみ） */
    /* A3 横向き想定。8列×3行=24枠で20カード配置。グランド／フッターまで1ページ内に収める。
       カード body の下余白を削って、その分を画像に回し品番が読みやすいサイズへ。 */
    .lighting-mode .lt-cards{grid-template-columns:repeat(8, 1fr)!important;gap:1.5mm!important;}
    .lighting-mode .lt-card{height:66mm;overflow:hidden;border-radius:3px;display:flex;flex-direction:column;}
    .lighting-mode .lt-card-head{padding:1mm 1.5mm!important;font-size:9.8px!important;line-height:1.2!important;flex-shrink:0;}
    .lighting-mode .lt-card-head .room{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lighting-mode .lt-card-head .qty{font-size:9px!important;padding:0.3mm 1.8mm!important;border-radius:7px;}
    /* 画像エリアを flex:1 で残りスペースを使い切り、品番が読みやすい大きさに。 */
    .lighting-mode .lt-card-img{flex:1;min-height:38mm!important;height:auto!important;}
    /* body は内容高さに合わせて縮める（下に空白を作らない）。 */
    .lighting-mode .lt-card-body{padding:1mm 2mm!important;font-size:9.2px!important;line-height:1.3!important;flex-shrink:0;}
    .lighting-mode .lt-card-body .meta{margin-top:0.4mm!important;}
    /* 階見出し（1階・2階）が次ページに飛ばされないよう抑制 */
    .lighting-mode .lt-floor-title{font-size:11.5px!important;padding:2px 9px!important;margin:3px 0 2.5px!important;break-before:avoid!important;page-break-before:avoid!important;break-after:avoid!important;page-break-after:avoid!important;}
    .lighting-mode .lt-grand{padding:3.5px 10px!important;margin:4px 0!important;}
    .lighting-mode .lt-grand-label{font-size:11px!important;}
    .lighting-mode .lt-grand-yen{font-size:16px!important;}
  }
</style>
</head>
<body>

<div id="toolbar">
  <h1 id="h1title">📋 仕様書メーカー</h1>
  <button class="doc active" id="docSpec" onclick="switchDoc('spec')">仕様一覧表</button>
  <button class="doc" id="docTategu" onclick="switchDoc('tategu')">建具表</button>
  <button class="doc" id="docKurosu" onclick="switchDoc('kurosu')">クロス図面</button>
  <button class="doc" id="docLighting" onclick="switchDoc('lighting')">照明図面</button>
  <button class="doc" id="docWiring" onclick="switchDoc('wiring')">配線数量表</button>
  <button class="doc" id="docHarimake" onclick="switchDoc('harimake')">貼り分け図面</button>
  <span style="width:14px"></span>
  <button class="tab active" id="tabEdit" onclick="showTab('edit')">編集</button>
  <button class="tab" id="tabView" onclick="showTab('view')">プレビュー</button>
  <span class="spacer"></span>
  <button onclick="printDoc()">🖨 印刷 / PDF保存</button>
  <button id="btnPrintCheck" onclick="printWiringCheck()" style="display:none;background:#a26a1f;color:#fff;">🔍 チェック用印刷</button>
  <!-- 物件プルダウン切替（ブラウザ内保存の物件を選択で即切替） -->
  <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px;padding-left:8px;border-left:1px solid #d0d0d0;">
    <span style="font-size:11px;color:#555;font-weight:bold;">📚 物件</span>
    <select id="projectSelect" onchange="switchProject(this.value)" style="padding:5px 8px;font-size:13px;border:1px solid #a0a0a0;border-radius:4px;background:#fff;min-width:180px;max-width:260px;">
      <option value="">（選択…）</option>
    </select>
    <button class="ghost" onclick="saveProjectAs()" style="font-size:12px;padding:5px 8px;" title="今のデータをブラウザ内に名前付きで保存">💾</button>
    <button class="ghost" onclick="deleteProject()" style="font-size:12px;padding:5px 8px;" title="選択中の物件を削除">🗑</button>
  </span>
  <button class="ghost" onclick="saveJson()" title="バックアップ用にJSONファイルを書き出す">📥 JSON書出</button>
  <button class="ghost" onclick="document.getElementById('loadFile').click()" title="JSONファイルを読み込む">📂 JSON読込</button>
  <button class="ghost" onclick="if(confirm('新しい物件として候補をリセットします。よろしいですか？'))resetProject()">🆕 新規</button>
  <input type="file" id="loadFile" accept="application/json" style="display:none" onchange="loadJson(event)">
</div>

<div class="wrap">
  <div id="editor"></div>
  <div id="previewWrap"><div id="sheet"></div></div>
</div>

<script>
/* ============================================================
   マスタ（候補リスト） ＝ ここを編集すれば候補が増減できます
   - area: '外部' / '内部'
   - common: 固定で表示する項目（{k:項目名, v:内容}）
   - attrs : 候補ごとに比べる項目の行ラベル（複数可）
   - variants: 候補。values にattrsの値、sw に色(または画像URL)
   - decided: 既定で決定にしておく候補番号（0始まり / 無し=null）
   ============================================================ */
const MASTER = {
  project:{
    title:"外部・内部仕様一覧表",
    name:"サンプル物件 新築工事",
    taste:"A",
    area_designation:"22条地域 ／ 風致地区：対象外",
    author:"河合 知加",
    decided_date:"",
    company:"アイニコグループ株式会社 一級建築士事務所",
    tel:"0742-71-9990",
    fax:"0742-71-9980",
    /* 屋根セクション用の赤文字メモ（特記事項。空なら印刷に出ない） */
    roof_note:"",
    /* 景観・風致のマンセル色彩規制（外壁・屋根などの外部色を自動判定）
       新方式：奈良市景観計画の区域・地区を選択 → 基準テーブルで判定
       旧方式：簡易プリセット（reg.on/valMin/chromaR 等）は段階的に廃止予定 */
    reg:{
      on:false, label:"対象外",
      // 旧方式の閾値（後方互換のため温存）
      valMin:0, valMax:10, chromaR:4, chromaYR:6, chromaY:4, chromaOther:2, allowN:true,
      // 新方式の区域・地区選択（Phase 2 で追加）
      designatedZone:"指定なし",   // 防火/準防火地域 → 玄関ドアの自動判定にも使う
      generalArea:"対象外",         // 8区域：大和青垣・自然・歴史的な風土・平地の里・山間の里・都心・市街地・西北部住宅地
      priorityDistrict:"対象外",    // 景観形成重点地区 27件
      fuchiType:"対象外",           // 風致地区種別
      fuchiName:"対象外",           // 風致地区名称
      fuchiZone:"対象外"            // 風致地区ゾーン
    }

const SAVEKEY = "naigaisou_project_v1";

const KRKEY   = "naigaisou_kurosu_v1";
const LTKEY   = "naigaisou_lighting_v1";
const WRKEY   = "naigaisou_wiring_v1";
const HKKEY   = "naigaisou_harimake_v1";

/* 候補カタログ（写真・品番・色など）は常に MASTER（ファイル）から読み込み、
   保存データからは「選んだ結果」だけを重ねる。
   → 写真や候補を更新すれば必ず反映され、各物件の選択は保たれる。 */
/* 旧形式のテイスト値（"内部 A" "外部B" 等）を A/B/C に正規化。読み取れなければ A 既定 */
function normalizeTaste(v){
  if(!v) return 'A';
  const s=String(v).trim().toUpperCase();
  if(s==='A'||s==='B'||s==='C') return s;
  const m=s.match(/[ABC]/);
  return m ? m[0] : 'A';
}
function mergeWithMaster(saved){
  const base = JSON.parse(JSON.stringify(MASTER));
  if(!saved || !saved.project) return base;
  // 物件情報（テキスト項目）を上書き
  Object.keys(base.project).forEach(k=>{ if(k!=='reg' && (k in saved.project)) base.project[k]=saved.project[k]; });
  base.project.taste=normalizeTaste(base.project.taste); // 旧"内部 A"等→"A"
  if(saved.project.reg) base.project.reg=Object.assign(JSON.parse(JSON.stringify(MASTER.project.reg)), saved.project.reg);
  // 各セクション：決定番号と、手入力で直した共通仕様の値だけを引き継ぐ
  base.sections.forEach(bs=>{
    const ss=(saved.sections||[]).find(x=>x.id===bs.id);
    if(!ss) return;
    if('decided' in ss) bs.decided=ss.decided;
    if('present' in ss && bs.optional) bs.present=ss.present;
    if(Array.isArray(ss.common)) bs.common.forEach(bc=>{
      const sc=ss.common.find(x=>x.k===bc.k); if(sc && 'v' in sc) bc.v=sc.v;
    });
  });
  return base;
}
function loadLocal(){
  let saved=null;
  const s = localStorage.getItem(SAVEKEY);
  if(s){ try{ saved = JSON.parse(s); }catch(e){} }
  DATA = mergeWithMaster(saved);
  let ts=localStorage.getItem(TGKEY);
  TG = ts ? normalizeTG(safeParse(ts)) : JSON.parse(JSON.stringify(TATEGU_MASTER));
  let ks=localStorage.getItem(KRKEY);
  KR = ks ? normalizeKR(safeParse(ks)) : JSON.parse(JSON.stringify(KUROSU_MASTER));
  let ls=localStorage.getItem(LTKEY);
  LT = ls ? normalizeLT(safeParse(ls)) : JSON.parse(JSON.stringify(LIGHTING_MASTER));
  let ws=localStorage.getItem(WRKEY);
  WR = ws ? normalizeWR(safeParse(ws)) : JSON.parse(JSON.stringify(WIRING_MASTER));
  let hs=localStorage.getItem(HKKEY);
  HK = hs ? normalizeHK(safeParse(hs)) : JSON.parse(JSON.stringify(HARIMAKE_MASTER));
}
function autosave(){
  try{
    localStorage.setItem(SAVEKEY, JSON.stringify(DATA));
    localStorage.setItem(TGKEY, JSON.stringify(TG));
    localStorage.setItem(KRKEY, JSON.stringify(KR));
    localStorage.setItem(LTKEY, JSON.stringify(LT));
    localStorage.setItem(WRKEY, JSON.stringify(WR));
    localStorage.setItem(HKKEY, JSON.stringify(HK));
    // 現在の物件名がセットされていれば、その物件データも同期保存
    // （プルダウン切替で戻った時に最新の編集内容が反映されるように）
    const currentName = (typeof getCurrentProjectName === 'function') ? getCurrentProjectName() : '';
    if(currentName){
      const list = loadProjectList();
      if(list[currentName]){
        list[currentName] = {
          spec:     DATA,
          tategu:   TG,
          kurosu:   KR,
          lighting: LT,
          wiring:   WR,
          harimake: HK,
          savedAt:  new Date().toISOString()
        };
        saveProjectList(list);
      }
    }
  }
  catch(e){ console.warn('autosave失敗', e); if(!autosave._warned){ autosave._warned=true; alert('自動保存の容量上限を超えました。取り込み画像が多い場合は「📥 JSON書出」でファイル保存してください。'); } }
}
function safeParse(s){ try{ return JSON.parse(s); }catch(e){ return null; } }

  document.getElementById('editor').innerHTML = h;
}
function renderEditor(){
  if(DOC==='tategu') renderTateguEditor();
  else if(DOC==='kurosu') renderKurosuEditor();
  else if(DOC==='lighting') renderLightingEditor();
  else if(DOC==='wiring') renderWiringEditor();
  else if(DOC==='harimake') renderHarimakeEditor();
  else renderSpecEditor();
}
function renderSheet(){
  if(DOC==='tategu') renderTateguSheet();
  else if(DOC==='kurosu') renderKurosuSheet();
  else if(DOC==='lighting') renderLightingSheet();
  else if(DOC==='wiring') renderWiringSheet();
  else if(DOC==='harimake') renderHarimakeSheet();
  else renderSpecSheet();
}
/* 印刷フロー：照明図面/配線数量表は会計上ペアなので、どちらのタブから印刷しても
   「照明図面 → 改ページ → 配線数量表」の連結書類として出力。他のタブは単独印刷。 */
function printDoc(){
  if(DOC==='lighting' || DOC==='wiring'){
    const origDoc = DOC;
    // 照明シートを生成
    DOC = 'lighting';
    renderLightingSheet();
    const lightingHTML = document.getElementById('sheet').innerHTML;
    // 配線シートを生成
    DOC = 'wiring';
    renderWiringSheet();
    const wiringHTML = document.getElementById('sheet').innerHTML;
    // 連結（A3横の改ページを強制）。各セクションに専用モードクラスを付けて、
    // 各図面用のスコープ付きCSS（.lighting-mode .lt-* / .wiring-mode table 等）が
    // どちらにも正しく当たるようにする。#sheet 自身のモードクラスは外す。
    const sheet = document.getElementById('sheet');
    Object.values(SHEET_MODE_MAP).forEach(c => sheet.classList.remove(c));
    sheet.innerHTML =
      `<div class="print-section lighting-mode">${lightingHTML}</div>` +
      `<div class="print-section wiring-mode" style="page-break-before:always;break-before:page;">${wiringHTML}</div>`;
    // 印刷ダイアログが閉じたら元の表示に戻す
    const restore = ()=>{
      window.removeEventListener('afterprint', restore);
      DOC = origDoc;
      setSheetMode(origDoc);
      renderSheet();
    };
    window.addEventListener('afterprint', restore);
    window.print();
  } else {
    window.print();
  }
}

/* 配線数量表のチェック用印刷：階別（1F/2F/その他）の内訳まで含めた根拠資料として、
   チェッカーさんが入力ミスや配分ミスを確認できる詳細版を生成して印刷する。
   通常の renderWiringSheet（お客様向け）とは別物。 */
function printWiringCheck(){
  const origDoc = DOC;
  const sheet = document.getElementById('sheet');
  renderWiringCheckSheet();
  const restore = ()=>{
    window.removeEventListener('afterprint', restore);
    DOC = origDoc;
    setSheetMode(origDoc);
    renderSheet();
  };
  window.addEventListener('afterprint', restore);
  window.print();
}

function setTaste(v){
  DATA.project.taste=v;
  const color=TASTE_COLOR[v];
  if(color){
    applyDoorColorPreset(color);
    TG.doors.forEach(d=>{
      if(d.color!=='WH（オフホワイト）') {
        d.color=color;
        d.handle=leverForTaste(d.handle, v); // 非WH建具のレバーハンドルBA↔RAをテイスト連動
      }
      else applyWhHandleIfNeeded(d, v); // WH色は把手をテイスト＋種類で連動（引違い戸は SH型ブラック/シルバー）
      if(d.threshold==='有') d.sill=TASTE_SILL[v]||''; // 敷居ありの建具は敷居色もテイスト連動
    });
  }
  renderEditor(); sync();
}

function renderSpecSheet(){
  // 区域（防火）→ 玄関ドア種別の自動同期（ロード時の保存値にも対応）
  applyDoorFireSpec();
  const p = DATA.project;
  // ちかさん指定：上部のタイトル＋物件名＋決定日／作成者ヘッダーは廃止。
  // 物件名・図面名・決定日・作成者は全部下のフッター枠に集約する。
  let h = '';

  // 景観・風致：決定済みの外部色を判定。新方式（区域・地区）優先、旧reg.onはフォールバック。
  const _apps = applicableKeikanBases();
  if(_apps.length){
    const ng=[];
    DATA.sections.filter(s=>s.variants.length && s.decided!=null && sectionKeikanTarget(s)).forEach(s=>{
      const v=s.variants[s.decided], mp=variantMunsell(s,v);
      if(!mp) return;
      const target = sectionKeikanTarget(s);
      const reasons=[];
      _apps.forEach(({bid,src})=>{ const j=checkColorBasis(bid,target,mp); if(!j.ok) reasons.push(`【${src} 基準${bid}】${j.reason}`); });
      if(reasons.length) ng.push(`${s.title}「${v.nm}」（${mp.hue} ${mp.value}/${mp.chroma}）：${reasons.join(' ／ ')}`);
    });
    const appLabel = _apps.map(a=>`${a.bid}（${a.src}）`).join('　／　');
    h += `<div class="regline">適用色彩基準：${esc(appLabel)}</div>`;
    if(ng.length) h += `<div class="warnbar">⚠ 景観色彩基準に不適合：<br>・${ng.map(esc).join('<br>・')}</div>`;
  } else if(p.reg.on){
    const ng=[];
    DATA.sections.filter(s=>s.area==='外部'&&s.variants.length&&s.decided!=null).forEach(s=>{
      const v=s.variants[s.decided], mp=variantMunsell(s,v);
      if(mp){ const j=judgeMunsell(mp,p.reg); if(!j.ok) ng.push(`${s.title}「${v.nm}」（${mp.hue} ${mp.value}/${mp.chroma}）：${j.errs.join('・')}`); }
    });
    h += `<div class="regline">適用色彩規制（簡易プリセット）：${esc(p.reg.label)}　／　明度 ${p.reg.valMin}〜${p.reg.valMax}　彩度上限 R${p.reg.chromaR}・YR${p.reg.chromaYR}・Y${p.reg.chromaY}・他${p.reg.chromaOther}</div>`;
    if(ng.length) h += `<div class="warnbar">⚠ 色彩規制に不適合の可能性：<br>・${ng.map(esc).join('<br>・')}</div>`;
  }

  ['外部','内部'].forEach((area, ai)=>{
    // 2つ目以降のエリア（内部）の前で強制改ページ → 1枚目=外部 / 2枚目=内部
    h += `<div class="area-block"${ai>0?' style="break-before:page;page-break-before:always;"':''}>`;
    h += `<div class="areaTitle">${area}</div>`;
    h += `<div class="sec-grid">`;
    DATA.sections.filter(s=>s.area===area && !(s.optional && !s.present)).forEach(s=>{
      h += `<div class="sec"><div class="sec-h">${esc(s.title)}</div><div class="sec-b">`;
      s.common.forEach(c=>{ if(c.v!=='') h += `<div class="kv"><div class="k">${esc(c.k)}</div><div class="v">${esc(c.v)}</div></div>`; });
      if(s.variants.length){
        const reg=DATA.project.reg;
        const v = (s.decided!=null)? s.variants[s.decided] : null;
        if(v){
          const det = s.attrs.map(a=>`${a}：${v.values[a]}`).filter(x=>!x.endsWith('：')).join('　／　');
          let stamp='';
          const _mp = variantMunsell(s,v);
          const _t  = sectionKeikanTarget(s);
          if(_mp && _t && _apps.length){
            // 新方式：適用基準すべてで判定 → 全てokなら適合
            const allOk = _apps.every(({bid})=>checkColorBasis(bid,_t,_mp).ok);
            stamp = `<span class="stamp ${allOk?'ok':'ng'}">${allOk?'景観基準 適合':'景観基準 不適合'}</span>`;
          } else if(reg.on && _mp){
            const j=judgeMunsell(_mp,reg);
            stamp=`<span class="stamp ${j.ok?'ok':'ng'}">${j.ok?'色彩規制 適合':'色彩規制 不適合'}</span>`;
          }
          h += `<div class="decided-box">
              <div class="dsw" style="background:${swStyle(v.sw,'contain')}"></div>
              <div class="dinfo"><div class="label">【 決 定 】</div><div class="nm">${esc(v.nm)}${stamp}</div><div class="det">${esc(det)}</div></div>
            </div>`;
        } else {
          h += `<div class="undecided">― 未決定（候補：${s.variants.map(x=>esc(x.nm)).join('・')}）―</div>`;
        }
      }
      // 屋根セクション：赤文字メモが入っていれば赤文字で表示
      if(s.id==='roof' && (p.roof_note||'').trim()){
        h += `<div style="color:#c0392b;font-weight:bold;font-size:12px;margin-top:6px;padding:6px 10px;border-left:3px solid #c0392b;background:#fff5f3;white-space:pre-wrap;line-height:1.5;">${esc(p.roof_note)}</div>`;
      }
      h += `</div></div>`;
    });
    h += `</div></div>`;  // /sec-grid /area-block
  });

  // 注意書き＋下部 Excel ライク枠（仕様一覧表のタイトルは2枚目=内部の下に来る）
  h += `<div class="note" style="margin-top:5mm;">※ 安全性・デザイン性・施工性を優先する場合、仕様詳細図面通りの施工とならない場合がございます。</div>`;
  h += renderProjectFooterHtml(p.title, /*compact*/false);

  document.getElementById('sheet').innerHTML = h;
}

/* ============================================================
   ユーティリティ
   ============================================================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
/* 画像のベースURL：ローカルでは空文字（相対パス）、Streamlit Cloudでは
   window.__IMG_BASE__（streamlit_app.py が <script> で注入する GitHub Raw URL） */
const IMG_BASE = (typeof window !== 'undefined' && window.__IMG_BASE__) || '';
/* 画像パスを実URLに整える：相対パスなら IMG_BASE を前置＋encodeURI、絶対URL/data:はそのまま */
function imgUrl(p){
  if(!p) return p;
  if(/^data:/.test(p) || /^https?:\/\//.test(p)) return p;
  return IMG_BASE + encodeURI(p);
}
function swStyle(sw,size,bg){
  size=size||'cover'; bg=bg||'#f3f3f3';
  if(!sw) return bg==='#f3f3f3'?'#ddd':bg;
  if(/^https?:|^data:/.test(sw)||/\.(png|jpe?g|webp|gif)$/i.test(sw)){
    return `${bg} center/${size} no-repeat url('${imgUrl(sw)}')`;
  }
  return sw;
}
/* 建具画像：📷取り込み(data:URI)や明示ファイル名があれば優先、無ければ 建具/{色}/{種類}.jpg を自動参照（色×種類カタログ） */
function doorImgSrc(d){ if(d.img) return d.img; if(d.color && d.type) return `建具/${d.color}/${d.type}.jpg`; return ''; }
/* 敷居色：保存/手入力値を優先。無ければ「敷居有無＝有」のとき現在テイストの既定色を自動表示（A=WH/B=PL/C=GE） */
function doorSill(d){ if(d.sill) return d.sill; if((d.threshold||'').trim()==='有') return TASTE_SILL[DATA.project.taste]||''; return ''; }
/* 把手画像のファイル名：(色) は除外、「表示錠付き」は残す（SH型表示錠付き.jpg のような専用画像を見られるように） */
function handleDesign(h){ return (h||'').replace(/（[^）]*）/g,'').trim(); }
/* 各WDの付属画像パス（建具/{色}/...）。色未設定なら空 */
function handleImgSrc(d){ const n=handleDesign(d.handle); return (d.color&&n) ? `建具/${d.color}/${n}.jpg` : ''; }
function lightScopeImgSrc(d){ return d.color ? `建具/${d.color}/ライトスコープ.jpg` : ''; }
function lockImgSrc(d){ return d.color ? `建具/${d.color}/表示錠.jpg` : ''; }
function sync(){ renderSheet(); autosave(); }

/* ============================================================
   奈良市景観計画 色彩基準テーブル（チェッカーから移植：app.py由来）
   ============================================================ */
const _EPS = 1e-9;
// _band(v_min_excl, v_max_incl, chroma_max) → [v_min_incl, v_max_incl, c_max]
const _b = (vminExcl, vmaxIncl, cmax) => [vminExcl + _EPS, vmaxIncl, cmax];
// _band_incl(v_min_incl, v_max_incl, chroma_max)
const _bi = (vminIncl, vmaxIncl, cmax) => [vminIncl, vmaxIncl, cmax];

const KEIKAN_BASIS = {
  // 1-① 大和青垣・自然・歴史的な風土
  "1-①": {
    "外壁": {
      "0.0R-5.0R":   [_b(5.0,7.0,1.0), _bi(2.0,5.0,2.0)],

/* 風致地区は基準PDF未取得のため、選択時は近似として 2-② を適用 */
const FUCHI_DEFAULT_BASIS = "2-②";

/* 色相帯キーを返す。R/YR/Y 以外は null（その他色相 → 禁止判定） */
function hueRangeKey(letter, num){
  if(letter==='R')  return num < 5.0 ? '0.0R-5.0R'   : '5.0R-10.0R';
  if(letter==='YR') return num < 5.0 ? '0.0YR-5.0YR' : '5.0YR-10.0YR';
  if(letter==='Y')  return num < 5.0 ? '0.0Y-5.0Y'   : '5.0Y-10.0Y';
  return null;
}

/* 1つの基準に対し外壁/屋根のマンセル値を判定 → {ok, reason} */
function checkColorBasis(basisId, target, mv){
  const table = (KEIKAN_BASIS[basisId]||{})[target];
  if(!table) return {ok:true, reason:'基準データなし（適合とみなす）'};
  if(mv.family==='N'){
    const bands = table['無彩色']||[];
    for(const [vmin,vmax,cmax] of bands){
      if(vmin <= mv.value && mv.value <= vmax) return {ok:true, reason:''};
    }
    return {ok:false, reason:`無彩色N${mv.value}が基準${basisId}の範囲外`};
  }
  const rk = hueRangeKey(mv.family, mv.hueNum||0);
  if(rk===null) return {ok:false, reason:`色相${mv.family}は基準${basisId}の対象外（その他色相）`};
  const bands = table[rk]||[];
  if(!bands.length) return {ok:false, reason:`色相帯${rk}は基準${basisId}で全面禁止`};
  for(const [vmin,vmax,cmax] of bands){
    if(vmin <= mv.value && mv.value <= vmax){
      if(cmax===null || mv.chroma <= cmax) return {ok:true, reason:''};
      return {ok:false, reason:`明度${mv.value}は${rk}の範囲内だが、彩度${mv.chroma}が許容${cmax}を超過`};
    }
  }
  return {ok:false, reason:`明度${mv.value}は${rk}のどの許容帯にも入らない`};
}

/* DATA.project.reg から適用すべき基準ID一覧を計算 → [{bid, src}] */
function applicableKeikanBases(){
  const r = DATA.project.reg || {};
  const out = [];
  if(r.generalArea && r.generalArea !== '対象外'){
    const b = GENERAL_AREA_TO_BASIS[r.generalArea];
    if(b) out.push({bid:b, src:`一般区域: ${r.generalArea}`});
  }
  if(r.priorityDistrict && r.priorityDistrict !== '対象外'){
    const b = PRIORITY_DISTRICT_TO_BASIS[r.priorityDistrict];
    if(b) out.push({bid:b, src:`重点地区: ${r.priorityDistrict}`});
  }
  if((r.fuchiName && r.fuchiName !== '対象外') ||
     (r.fuchiType && r.fuchiType !== '対象外')){
    const lbl = [r.fuchiName, r.fuchiType, r.fuchiZone].filter(x=>x && x!=='対象外').join('/');
    out.push({bid:FUCHI_DEFAULT_BASIS, src:`風致地区: ${lbl}（近似: ${FUCHI_DEFAULT_BASIS}）`});
  }
  return out;
}

/* ============================================================
   景観・風致 マンセル色彩規制（旧システム：Phase 4 で段階的に置換）
   ============================================================ */
const REG_PRESETS={
  "対象外":            {on:false,label:"対象外",      valMin:0,valMax:10,chromaR:4,chromaYR:6,chromaY:4,chromaOther:2,allowN:true},
  "景観地区（標準）":   {on:true, label:"景観地区（標準）",valMin:0,valMax:10,chromaR:4,chromaYR:6,chromaY:4,chromaOther:2,allowN:true},
  "風致地区（厳しめ）": {on:true, label:"風致地区（厳しめ）",valMin:0,valMax:6, chromaR:4,chromaYR:4,chromaY:4,chromaOther:2,allowN:true}
};

/* マンセル文字列を分解： "1.3Y 5.3/0.6" → {family:'Y', value:5.3, chroma:0.6} */
function parseMunsell(str){
  if(str==null) return null;
  str=String(str).trim();
  let m=str.match(/^N\s*([\d.]+)/i);
  if(m) return {family:'N', hue:'N', value:+m[1], chroma:0, txt:str};
  m=str.match(/([\d.]+)\s*([A-Za-z]{1,2})\s+([\d.]+)\s*\/\s*([\d.]+)/);
  if(!m) return null;
  return {hueNum:+m[1], family:m[2].toUpperCase(), hue:m[1]+m[2].toUpperCase(), value:+m[3], chroma:+m[4], txt:str};
}
/* 規制に照らして判定 */
function judgeMunsell(p,reg){
  if(!p) return null;
  const e=[];
  if(p.family==='N'){ if(!reg.allowN) e.push('無彩色は使用不可'); }
  else{
    let maxC = p.family==='R'?reg.chromaR : p.family==='YR'?reg.chromaYR : p.family==='Y'?reg.chromaY : reg.chromaOther;
    if(maxC<=0) e.push(`色相${p.family}系は使用不可`);
    else if(p.chroma>maxC+1e-9) e.push(`彩度 ${p.chroma} ＞ 上限${maxC}`);
  }
  if(p.value<reg.valMin-1e-9) e.push(`明度 ${p.value} ＜ 下限${reg.valMin}`);
  if(p.value>reg.valMax+1e-9) e.push(`明度 ${p.value} ＞ 上限${reg.valMax}`);
  return {ok:e.length===0, errs:e, p};
}
/* 外部セクションの候補からマンセル値を拾う */
function variantMunsell(s,v){
  if(s.area!=='外部') return null;
  for(const a of s.attrs){ const p=parseMunsell(v.values[a]); if(p) return p; }
  return null;
}
/* セクションのターゲット（外壁／屋根）を推定 */
function sectionKeikanTarget(s){
  if(s.id==='siding' || s.id==='paint_out') return '外壁';
  if(s.id==='roof') return '屋根';
  return null;
}
/* 編集パネル：候補カードの適合バッジ
   優先順位：景観基準（区域・地区選択あり）＞ 旧プリセット（reg.on）＞ 表示なし */
function compBadge(s,v){
  const p = variantMunsell(s,v);
  if(!p) return '';
  // 新方式：適用基準があれば判定
  const target = sectionKeikanTarget(s);
  const apps = applicableKeikanBases();
  if(apps.length && target){
    const ngs = [];
    for(const {bid, src} of apps){
      const j = checkColorBasis(bid, target, p);
      if(!j.ok) ngs.push(`【${src} 基準${bid}】${j.reason}`);
    }
    const ok = ngs.length===0;
    const srcList = apps.map(a=>`基準${a.bid}`).join('・');
    return `<div class="comp ${ok?'ok':'ng'}">${ok?'✓ 適合':'✗ 不適合'}
      <span class="mz">${esc(p.hue)} ${p.value}/${p.chroma}　${esc(srcList)}</span>${ok?'':'<br>'+esc(ngs.join(' ／ '))}</div>`;
  }
  // 旧方式：プリセット（reg.on）
  const reg=DATA.project.reg; if(!reg.on) return '';
  const j=judgeMunsell(p,reg);
  return `<div class="comp ${j.ok?'ok':'ng'}">${j.ok?'✓ 適合':'✗ 不適合'}
    <span class="mz">${esc(p.hue)} ${p.value}/${p.chroma}</span>${j.ok?'':'<br>'+esc(j.errs.join('・'))}</div>`;
}
/* 編集パネル：規制カード */
function regCard(){
  const r=DATA.project.reg;
  const opt=Object.keys(REG_PRESETS).map(k=>`<option ${r.label===k?'selected':''}>${k}</option>`).join('');
  const num=(lab,key)=>`<span class="n">${lab}</span><input type="number" step="0.1" value="${r[key]}" oninput="setReg('${key}',this.value)">`;
  return `<details class="card regcard" ${r.on?'open':''}><summary><span class="area" style="background:#a26a1f">地区</span>景観・風致 マンセル色彩規制</summary><div class="body">
    <div class="field"><label>地区プリセット</label>

function setReg(key,val){
  // 文字列フィールド（新規追加の区域選択）
  const stringKeys = ['label','designatedZone','generalArea','priorityDistrict','fuchiType','fuchiName','fuchiZone'];
  if(key==='on'||key==='allowN') DATA.project.reg[key]=val;
  else if(stringKeys.includes(key)) DATA.project.reg[key]=val;
  else DATA.project.reg[key]=parseFloat(val)||0;
  // 指定区域（防火）変更で 玄関ドア種別を自動切替：防火/準防火 → ジエスタ2 防火戸
  if(key==='designatedZone') applyDoorFireSpec();

}

   防火/準防火 → 「開き戸　ジエスタ2　防火戸」、それ以外 → 「開き戸　ジエスタ2」 */
function applyDoorFireSpec(){
  const doorSec = DATA.sections.find(s=>s.id==='door');
  if(!doorSec) return;
  const dz = (DATA.project.reg||{}).designatedZone || '';
  const isFire = (dz==='防火地域' || dz==='準防火地域');
  const target = doorSec.common.find(c=>c.k==='商品名・種類');
  if(target) target.v = isFire ? '開き戸　ジエスタ2　防火戸' : '開き戸　ジエスタ2';
}

function normalizeLT(l){
  const base = JSON.parse(JSON.stringify(LIGHTING_MASTER));
  if(!l || typeof l!=='object') return base;
  if(!l.meta) l.meta = base.meta;
  ['title','note'].forEach(k=>{ if(l.meta[k]==null) l.meta[k]=base.meta[k]; });
  if(!Array.isArray(l.entries)) l.entries = [];
  // 各エントリのキーを補完。旧データの hinban/type/kelvin/watt は廃止、price は数値化。
  l.entries = l.entries.map(e=>{
    const o = Object.assign({
      floor:"1階", room:"", maker:"", name:"", qty:1, price:0, img:"", remark:""
    }, e);
    delete o.hinban;  // 旧：品番（廃止）
    delete o.type;    // 旧：種類（廃止）
    delete o.kelvin;  // 旧：色温度（廃止。項目名に含めて表現）
    delete o.watt;    // 旧：W数（廃止。項目名に含めて表現）
    o.price = Number(o.price)||0;
    o.qty = Math.max(1, parseInt(o.qty)||1);
    // 既存エントリに項目があり画像が空ならカタログから自動セット（決まってる商品は画像も自動）
    if(o.name && !o.img && typeof LT_ITEM_IMG !== 'undefined' && LT_ITEM_IMG[o.name]){
      o.img = LT_ITEM_IMG[o.name];
    }
    return o;
  });
  return l;
}

/* 坪数から標準数量を返す（範囲外は最も近い帯のもの。20坪未満はnull） */
function wrStandardForTsubo(tsubo){
  const t = Number(tsubo)||0;
  if(t < 20) return null;  // 20坪未満は表に無いのでnull返却
  for(const r of WR_TSUBO_STANDARD){
    if(t >= r.min && t < r.max) return {lighting:r.lighting, outlet:r.outlet};
  }
  return null;
}

function normalizeWR(w){
  const base = JSON.parse(JSON.stringify(WIRING_MASTER));
  if(!w || typeof w!=='object') return base;
  if(!w.meta) w.meta = base.meta;
  ['title','note'].forEach(k=>{ if(w.meta[k]==null) w.meta[k]=base.meta[k]; });
  ['pm_name','pm_tel','ic_name','ic_tel'].forEach(k=>{ if(typeof w.meta[k]!=='string') w.meta[k]=''; });
  w.tsubo       = Number(w.tsubo)||0;
  w.tsubo_image = String(w.tsubo_image || '');
  w.base_price  = Number(w.base_price)||8000;
  if(typeof w.memo !== 'string') w.memo = '';
  // items / extraItems：保存済みの 1F/2F/その他＋place を引き継ぎ、マスタ定義は最新で上書き
  const mergeFloors = (masterArr, savedArr)=>{
    const saved = {};
    (Array.isArray(savedArr)?savedArr:[]).forEach(it=>{
      if(!it || !it.key) return;
      saved[it.key] = {
        floor1: Number(it.floor1)||0,
        floor2: Number(it.floor2)||0,
        other:  Number(it.other) || (it.floor1==null && it.floor2==null ? Number(it.current)||0 : 0),
        place:  String(it.place||'')
      };
    });
    return masterArr.map(masterItem=>{
      const o = Object.assign({floor1:0, floor2:0, other:0, place:''}, masterItem);
      const sv = saved[o.key] || {floor1:0, floor2:0, other:0, place:''};
      o.floor1 = sv.floor1; o.floor2 = sv.floor2; o.other = sv.other; o.place = sv.place;
      o.current = o.floor1 + o.floor2 + o.other;
      return o;
    });
  };
  w.items      = mergeFloors(base.items,      w.items);
  w.extraItems = mergeFloors(base.extraItems, w.extraItems);
  return w;
}
function wrTeika(){    return Math.round((Number(WR.tsubo)||0) * (Number(WR.base_price)||0)); }
function wrMochibun(){ return Math.round(wrTeika() * 0.8); }
/* 各itemの基本数量を返す（fromTsubo指定なら坪数別表から取得） */
function wrItemBase(it){
  if(it.calc==='skip') return null;
  if(it.fromTsubo){
    const std = wrStandardForTsubo(WR.tsubo);
    if(!std) return 0;
    return it.fromTsubo==='lighting' ? std.lighting : std.outlet;
  }
  return Number(it.base)||0;
}
/* 追加個数＝max(0, 現状数量−基本数量)。calc:'skip'は計算対象外 */
function wrItemAdditional(it){
  if(it.calc==='skip') return null;
  const b = wrItemBase(it) || 0;
  const c = Number(it.current)||0;
  return Math.max(0, c - b);
}
/* 総額＝追加個数×工事代金 */
function wrItemSubtotal(it){
  if(it.calc==='skip') return null;
  const a = wrItemAdditional(it) || 0;
  return a * (Number(it.unit)||0);
}
/* 上部集計：照明データから自動算出
   - 定価合計（税抜）＝LTエントリの (price × qty) の合計
   - お客様だし合計（税抜）＝LTエントリの (price × qty × 0.8) の合計
   - ①差額＝お客様だし合計−持ち分（プラスなら超過、マイナスなら持ち分内に収まる。符号付きで返す）
   - 計上個数合計＝LTエントリの qty 合計
   - ②配線追加工事合計＝WR.itemsのsubtotal合計
   - ③①+②＝差額＋配線追加工事合計（追加電気工事等合計）
     ※持ち分は標準工事に含まれているので、お客様が実際に追加で支払う金額は『超過分（差額）＋配線追加』となる。 */
function wrSummary(){
  let teika = 0, customer = 0, qty = 0;
  if(LT && Array.isArray(LT.entries)){
    LT.entries.forEach(e=>{
      const sub = (Number(e.price)||0) * (parseInt(e.qty)||0);
      teika += sub;
      qty += (parseInt(e.qty)||0);
    });
    customer = Math.round(teika * (typeof LT_KAKERITSU!=='undefined' ? LT_KAKERITSU : 0.8));
  }
  const itemsSub  = (WR && Array.isArray(WR.items))      ? WR.items.reduce((s,it)=>s + (wrItemSubtotal(it)||0), 0) : 0;
  const extraSub  = (WR && Array.isArray(WR.extraItems)) ? WR.extraItems.reduce((s,it)=>s + (wrItemSubtotal(it)||0), 0) : 0;
  const wiringSub = itemsSub + extraSub;
  return {
    okyakuTotal: customer,                  // ① お客様だし金額合計（=照明追加工事代金）
    teikaTotal:  teika,                     // 照明器具代金定価合計
    diff: customer - wrMochibun(),          // ①差額（お客様だし金額合計 − 持ち分）
    qtyTotal: qty,                          // 計上商品個数合計
    wiringTotal: wiringSub,                 // ② 配線工事ご請求代金合計
    grandTotal:  (customer - wrMochibun()) + wiringSub  // ③ ①+② ＝ 差額＋配線追加工事
  };
}

/* 床下エアコンの選択肢。"斜線"は印刷シートで本物の斜め線として描画する */
const TG_FLOOR_AC=["ガラリ図面参照","斜線"];
/* 床下点検口の色（1F のみ。プルダウンの選択肢） */
const TG_FLOOR_INSPECTION=["アイボリー","ナチュラル"];
/* 床下点検口の色 → 画像（プレビュー＆印刷で色見本を表示） */
const TG_INSPECTION_IMG={"アイボリー":"床/アイボリー.png","ナチュラル":"床/ナチュラル.png"};
const SLASH_SVG=`<svg viewBox="0 0 100 20" preserveAspectRatio="none" style="width:170px;height:16px;display:inline-block;vertical-align:middle"><line x1="0" y1="20" x2="100" y2="0" stroke="#333" stroke-width="1.2" vector-effect="non-scaling-stroke"/></svg>`;
/* カード内セル用：横いっぱいに引く斜め線 */
const SLASH_CELL=`<svg viewBox="0 0 100 16" preserveAspectRatio="none" style="flex:1;height:14px;align-self:center"><line x1="0" y1="16" x2="100" y2="0" stroke="#333" stroke-width="1" vector-effect="non-scaling-stroke"/></svg>`;
function normalizeTG(t){
  const base=JSON.parse(JSON.stringify(TATEGU_MASTER));
  if(!t || typeof t!=='object') return base;
  if(!t.meta) t.meta=base.meta;
  ['title','maker','plan_image'].forEach(k=>{ if(t.meta[k]==null) t.meta[k]=base.meta[k]; });
  if(!Array.isArray(t.meta.spec_images)) t.meta.spec_images=[];
  // 階ごとの間取り図画像。旧 plan_image（単一）は 1階の画像として自動移行。
  if(!t.meta.plan_images || typeof t.meta.plan_images!=='object'){
    t.meta.plan_images = {"1階":"", "2階":""};
    if(t.meta.plan_image) t.meta.plan_images["1階"]=t.meta.plan_image;
  }
  // 建具仕様（共通）・床仕様：1F/2F分割対応（旧データの common / floor から自動移行）
  // 旧フォーマット：t.common / t.floor → 両方の階に同じ内容をコピー
  const oldCommon = Array.isArray(t.common) ? t.common : null;
  const oldFloor  = Array.isArray(t.floor)  ? t.floor  : null;
  t.common_1f = migrateCommon(Array.isArray(t.common_1f) ? t.common_1f : (oldCommon || base.common_1f));
  t.common_2f = migrateCommon(Array.isArray(t.common_2f) ? t.common_2f : (oldCommon || base.common_2f));
  t.floor_1f  = migrateFloor(Array.isArray(t.floor_1f)  ? t.floor_1f  : (oldFloor  || base.floor_1f), false);
  t.floor_2f  = migrateFloor(Array.isArray(t.floor_2f)  ? t.floor_2f  : (oldFloor  || base.floor_2f), true);
  delete t.common; delete t.floor;  // 旧キーは保存しない
  t.doors = migrateDoors(Array.isArray(t.doors)?t.doors:base.doors);
  return t;
}
/* 各建具の付属フラグ（ライトスコープ/表示錠）を整備。未設定なら把手・備考から自動判定 */
function migrateDoors(arr){
  return (arr||[]).map(d=>{
    const o=Object.assign({lightScope:false, lock:false, sill:''}, d);
    if(o.handle) o.handle=o.handle.replace(/レバーハンドルB\.A型/g,'レバーハンドルBA型'); // 旧表記→新表記
    // トイレ室の建具種類を専用タイプへ自動移行（把手等もリセット）
    if((o.room||'').trim()==='トイレ'){
      if(o.type==='片開きドア') o.type='トイレドア';
      else if(o.type==='片引戸') o.type='片引戸トイレタイプ';
      const pre=TYPE_PRESET[o.type];
      if(pre){
        if(pre.handle!=null) o.handle=pre.handle;
        o.lightScope=pre.lightScope;
        o.lock=pre.lock;
      }
    }
    // 旧種類名→新種類名（表記を統一）
    if(TYPE_RENAME[o.type]) o.type=TYPE_RENAME[o.type];
    if(d.lightScope===undefined) o.lightScope = /ライトスコープ/.test(d.remark||'');
    if(d.lock===undefined)       o.lock       = /表示錠付き/.test(o.handle||'') || /表示錠/.test(d.remark||'');
    // 備考②（remark2）が無い旧データから自動分離：
    //   旧remark に「表示錠付き／ライトスコープ付き／表示錠・ライトスコープ付き」が含まれていれば remark2 へ移し、
    //   それでも空なら lightScope/lock のフラグから初期値を決める。
    //   旧remark 側からは該当語句と区切りを除去して、備考①は素のテキストに整える。
    if(d.remark2===undefined){
      const r=String(d.remark||'');
      let r2='';
      if(/表示錠[・･]?ライトスコープ付き/.test(r)) r2='表示錠・ライトスコープ付き';
      else if(/表示錠付き/.test(r)||/^表示錠$/.test(r.trim())) r2='表示錠';
      else if(/ライトスコープ付き/.test(r)) r2='ライトスコープ付き';
      else if(o.lightScope&&o.lock) r2='表示錠・ライトスコープ付き';
      else if(o.lock) r2='表示錠';
      else if(o.lightScope) r2='ライトスコープ付き';
      let nr=r.replace(/表示錠[・･]?ライトスコープ付き/g,'')
              .replace(/表示錠付き/g,'').replace(/ライトスコープ付き/g,'')
              .replace(/ライトスコープ[A-ZＡ-Ｚ]/g,'').replace(/表示錠/g,'')
              .replace(/[／\/]{2,}/g,'／').replace(/^[\s／\/]+|[\s／\/]+$/g,'');
      o.remark=nr;
      o.remark2=r2;
    }
    // 備考①-2（remark1_2）：ちかさん要望で追加。備考①と同じ選択肢からもう1つ選べる。
    // 旧データには存在しないため空文字で初期化（プレビューは空なら非表示）。
    if(d.remark1_2===undefined) o.remark1_2 = '';
    else o.remark1_2 = String(d.remark1_2||'');
    return o;
  });
}
/* 建具仕様（共通）を整える。ドア色など対象項目は、旧データの
   「GE（グレージュ）　※一部変更：オフホワイト」を 本体(v) と 一部変更(note) に分解。 */
function migrateCommon(arr){
  return (arr||[]).map(c=>{
    const item={k:c.k, v:c.v||'', note:c.note||''};
    if(TG_COMMON_NOTE.includes(c.k) && !item.note){
      const m=/^(.*?)[　\s]*※\s*一部変更\s*[:：]\s*(.+)$/.exec(item.v);
      if(m){ item.v=m[1].trim(); item.note=m[2].trim(); }
    }
    return item;
  });
}
/* 床仕様を整える。基本＝フローリング／畳／床下点検口／床下エアコン。
   旧データの内部土間仕上げ・無垢フローリング等は除外し、「フローリング（2P/3P）」は「フローリング」へ統合。
   畳タイプが選択されている場合のみ、和室付随行（敷居・畳よせ・雑巾摺）を畳の直後に追加。
   is2f=true（2F）の時は床下点検口・床下エアコンを含めない（2F には無いため）。 */
function migrateFloor(arr, is2f){
  arr=arr||[];
  const pick=k=> arr.find(x=> x.k===k || (k==='フローリング'&&/^フローリング/.test(x.k||'')) );
  const fl=pick('フローリング')||{};
  const ta=pick('畳')||{};
  const tatami={k:'畳', type:ta.type||'', color:ta.color||'', count:ta.count||'', img:ta.img||''};
  const out=[ {k:'フローリング', v:fl.v||'', pattern:fl.pattern||'', img:fl.img||''}, tatami ];
  if(tatami.type){
    WASHITSU_ROWS.forEach(w=>{
      const ex=arr.find(x=>x.k===w.k);
      out.push(ex ? {k:w.k, v:ex.v||'', spec:ex.spec||''} : JSON.parse(JSON.stringify(w)));
    });
  }
  if(!is2f){
    out.push({k:'床下点検口', v:(pick('床下点検口')||{}).v||'アイボリー'});
    out.push({k:'床下エアコン', v:(pick('床下エアコン')||{}).v||''});
  }
  return out;
}

/* applyDoorColorPreset：指定階のドア色＋連動項目をプリセット適用。
   fk='1f' or '2f' or 'all'（all なら両方の階に適用 = テイスト連動時など） */
function applyDoorColorPreset(fkOrColor, colorMaybe){
  // 後方互換：第1引数だけで色を渡された場合は両方の階に適用
  let fk, color;
  if(arguments.length===1){ fk='all'; color=fkOrColor; }
  else { fk=fkOrColor; color=colorMaybe; }
  const floorsToApply = (fk==='all') ? ['1f','2f'] : [fk];
  floorsToApply.forEach(f=>{ _applyDoorColorPresetFloor(f, color); });
}
function _applyDoorColorPresetFloor(fk, color){
  const common = TG['common_'+fk];
  const floor  = TG['floor_'+fk];
  if(!common || !floor) return;
  const di=common.findIndex(c=>c.k==='ドア色');
  if(di>=0) common[di].v=color;
  const p=DOOR_COLOR_PRESET[color];
  if(p){
    common.forEach(c=>{ if(p[c.k]!=null) c.v=p[c.k]; });
    const fi=floor.findIndex(c=>c.k==='フローリング');
    if(fi>=0 && p['フローリング']!=null) floor[fi].v=p['フローリング'];
    if(fi>=0 && FLOOR_IMG[color]) floor[fi].img=FLOOR_IMG[color];
  }
}

/* 画像ファイルを縮小して data:URI に変換（容量を抑える） */
function fileToDataURL(file,maxW,cb){
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1, maxW/img.naturalWidth);
      const cw=Math.max(1,Math.round(img.naturalWidth*scale)), ch=Math.max(1,Math.round(img.naturalHeight*scale));
      const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
      cv.getContext('2d').drawImage(img,0,0,cw,ch);
      let durl; try{ durl=cv.toDataURL('image/jpeg',0.82); }catch(e){ durl=r.result; }
      cb(durl);
    };
    img.onerror=()=>{ alert('画像を読み込めませんでした。'); };
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

/* ---- 設計仕様詳細の画像から WD番号・幅・高さ を自動読み取り（OCR） ---- */
let _tessPromise=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve(window.Tesseract);
  if(_tessPromise) return _tessPromise;
  _tessPromise=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=()=>res(window.Tesseract);
    s.onerror=()=>rej(new Error('OCRライブラリを読み込めません（インターネット接続が必要です）'));
    document.head.appendChild(s);
  });
  return _tessPromise;
}
/* OCRテキストから WD番号 / W値 / H値 を抽出（WDのWは「W＋数字」ではないので幅Wと混ざらない） */
function tgParseSizes(text){
  // 全角英数字を半角化、区切り掃除
  let t=String(text||'')
    .replace(/[Ａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[，、]/g,',').replace(/[Ｘx×]/g,'x');
  const wds=(t.match(/WD\s?\d{2,3}/gi)||[]).map(x=>x.replace(/\s/g,'').toUpperCase());
  const ws=[...t.matchAll(/W\s?[:=]?\s?(\d{3,4})/gi)].map(m=>m[1]);
  const hs=[...t.matchAll(/H\s?[:=]?\s?(\d{3,4})/gi)].map(m=>m[1]);
  return {wds,ws,hs};
}
/* OCR前処理：拡大＋白黒くっきり化（細かい表の数字を読みやすく） */
function preprocessForOcr(src){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      // 小さい画像ほど大きく拡大（目標幅 約2400px、最大6倍）して文字をくっきりさせる
      let up = 2400 / img.naturalWidth; up = Math.max(1, Math.min(6, up));
      const w=Math.round(img.naturalWidth*up), h=Math.round(img.naturalHeight*up);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.drawImage(img,0,0,w,h);
      try{
        const id=ctx.getImageData(0,0,w,h), d=id.data;
        for(let p=0;p<d.length;p+=4){ const g=0.299*d[p]+0.587*d[p+1]+0.114*d[p+2]; const v=g<155?0:255; d[p]=d[p+1]=d[p+2]=v; }
        ctx.putImageData(id,0,0);
      }catch(e){}
      res(cv.toDataURL('image/png'));
    };
    img.onerror=()=>res(src);
    img.src=src;
  });
}
/* ローカルAIサーバー（ocr_server.py）のURL */
/* OCRエンドポイントの切替：Cloud時（IMG_BASE が GitHub Raw URL）は Vercel Functions、
   ローカル時はローカルOCRサーバ（ocr_server.py）。URLは window.__OCR_HOST__ で
   streamlit_app.py から上書き可能。 */
const OCR_HOST = (typeof window !== 'undefined' && window.__OCR_HOST__) ||
                 (IMG_BASE ? 'https://naigaisou-app-ocr.vercel.app' : 'http://127.0.0.1:8788');
const OCR_API_URL = `${OCR_HOST}/api/ocr-tategu`;

/* 読み取り結果（{no,type,w,h,room}の配列）を建具リストに反映（既存は更新／無ければ新規） */
function tgApplyDoorData(list){
  let filled=0, created=0;
  (list||[]).forEach(d=>{
    const no=String(d.no||'').replace(/\s/g,'').toUpperCase();
    if(!no) return;
    let ex=TG.doors.find(x=>(x.no||'').replace(/\s/g,'').toUpperCase()===no);
    if(!ex){
      const num=no.replace(/\D/g,'');
      const fl=num.length>=3 ? num[0]+'階' : '1階';
      ex={floor:fl,no,room:"",type:"",hinban:"B-XF",color:"GE（グレージュ）",w:"",h:"",handle:"",threshold:"",remark:"",remark2:"",img:""};
      TG.doors.push(ex); created++;
    }
    if(d.w) ex.w=String(d.w); if(d.h) ex.h=String(d.h);
    if(d.type && !ex.type) ex.type=String(d.type);
    if(d.room && !ex.room) ex.room=String(d.room);
    filled++;
  });
  TG.doors.sort((a,b)=>(a.no||'').localeCompare(b.no||'',undefined,{numeric:true}));
  renderEditor(); renderSheet(); autosave();
  return {filled,created};
}
/* ① AIサーバーで読み取り（高精度） */
async function tgOcrViaApi(dataUrl){
  let res;
  try{ res=await fetch(OCR_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:dataUrl})}); }
  catch(e){ const err=new Error('AIサーバーに接続できません'); err.noServer=true; throw err; }
  if(!res.ok){ let msg='サーバーエラー '+res.status; try{const j=await res.json(); if(j.error) msg=j.error;}catch(e){} throw new Error(msg); }
  const data=await res.json();
  return Array.isArray(data.doors)?data.doors:[];
}
/* ② 端末内の簡易OCR（サーバー未起動時のフォールバック） */
async function tgOcrViaTesseract(dataUrl){
  const T=await loadTesseract();
  const proc=await preprocessForOcr(dataUrl);
  const {data}=await T.recognize(proc,'eng');
  window._lastOcr=data.text;
  const {wds,ws,hs}=tgParseSizes(data.text);
  const n=Math.min(wds.length,ws.length,hs.length);
  const list=[];
  for(let k=0;k<n;k++) list.push({no:wds[k], w:ws[k], h:hs[k]});
  return list;
}
async function tgOcrSpec(i){
  const s=TG.meta.spec_images[i];
  if(!s||!s.file){ alert('先に「📷 画像を選択」で画像を取り込んでください。'); return; }
  const btn=document.getElementById('ocrbtn'+i);
  if(btn){ btn.disabled=true; btn.dataset.t=btn.dataset.t||btn.textContent; }
  const setBtn=t=>{ if(btn) btn.textContent=t; };
  let usedApi=false, list=[];
  try{
    setBtn('AIで読み取り中…');
    try{ list=await tgOcrViaApi(s.file); usedApi=true; }
    catch(apiErr){
      console.warn('OCR API 失敗', apiErr);
      if(apiErr && apiErr.noServer){
        if(!confirm('⚠ AIサーバーに接続できませんでした。\n\n「OCR起動.bat」をダブルクリックして起動し（黒い画面が出たままにする）、もう一度「📐」を押してください。\n\n［OK］を押すと、今回はかわりに簡易OCR（精度低め）で試します。')) return;
        setBtn('簡易OCRで読み取り中…');
        list=await tgOcrViaTesseract(s.file); usedApi=false;
      } else {
        alert('AIサーバーでエラーが発生しました：\n'+(apiErr&&apiErr.message?apiErr.message:apiErr)); return;
      }
    }
    if(!list.length){ alert((usedApi?'AIが表を読み取れませんでした。':'簡易OCRでは読み取れませんでした。')+'\n表（WD番号・幅・高さ）がはっきり大きく写った画像でお試しください。'+(usedApi?'':'\n\nAIサーバー（OCR起動.bat）を使うと精度が上がります。')); return; }
    const {filled,created}=tgApplyDoorData(list);
    alert(`読み取り完了（${usedApi?'AI':'簡易OCR'}）：${filled}件を反映（新規${created}件）。\n\n${usedApi?'※ 念のため数値をご確認ください。':'※ 簡易OCRは誤読が出やすいです。OCR起動.bat でAIサーバーを起動すると精度が上がります。数値を必ずご確認ください。'}`);
  }catch(e){
    alert('読み取りに失敗しました：'+(e&&e.message?e.message:e));
  }finally{
    if(btn){ btn.disabled=false; btn.textContent=btn.dataset.t||'📐 画像から W・H を自動入力'; }
  }
}
/* 階ごとに自動採番して建具を追加（WD1xx=1階 / WD2xx=2階。1階あたりWD13まで等、必要数を追加可） */
function tgAddDoorFloor(floor){
  const prefix = floor==='2階' ? 'WD2' : 'WD1';
  const n = String(TG.doors.filter(d=>d.floor===floor).length + 1).padStart(2,'0');
  const door={floor, no:prefix+n, room:"", type:"", hinban:"B-XF", color:"GE（グレージュ）", w:"", h:"", handle:"", threshold:"", sill:"", remark:"", remark2:"", img:""};
  let idx=-1; TG.doors.forEach((d,i)=>{ if(d.floor===floor) idx=i; });
  TG.doors.splice(idx+1,0,door);
  renderEditor(); sync();
}
function tgDelDoor(i){ if(confirm('この建具を削除しますか？')){ TG.doors.splice(i,1); renderEditor(); sync(); } }

/* 建具表：印刷シート */
function renderTateguSheet(){
  const p=DATA.project, m=TG;
  // ちかさん指定：上部ヘッダー廃止。物件名・図面名は各階下のフッター枠に集約。
  let h='';
  // 建具カードHTML生成（階ごとページから共用）
  const cardHtml = d => {
    const size=(d.w||d.h)?`W${esc(d.w)} × H${esc(d.h)}`:'';
    const hinbanColor=[d.hinban,d.color].filter(Boolean).map(esc).join('　');
    return `<div class="tg-card">
      <div class="tg-card-head"><span class="no">${esc(d.no)}</span><span class="room"${!String(d.room||'').trim()?' style="background:#ff0000;color:#fff;padding:0 6px;font-weight:bold;"':''}>${String(d.room||'').trim()?esc(d.room):'⚠ 室名未入力'}</span></div>
      <div class="tg-card-body">
        <div class="tg-card-img-wrap"><div class="tg-card-img" style="background:${swStyle(doorImgSrc(d),'contain','#fff')}"></div></div>
        <div class="tg-card-attrs">
          <div class="row"><span class="k">把手デザイン</span><span class="v">${esc(d.handle)}${handleImgSrc(d)?`<span class="acc-img" style="background:${swStyle(handleImgSrc(d),'contain','#fff')}"></span>`:''}</span></div>
          <div class="row"><span class="k">敷居有無</span><span class="v">${d.threshold?esc(d.threshold):SLASH_CELL}</span></div>
          <div class="row"><span class="k">敷居色／種類</span><span class="v">${doorSill(d)?esc(doorSill(d)):SLASH_CELL}</span></div>
          ${d.lightScope?`<div class="row"><span class="k">ライトスコープ</span><span class="v">あり<span class="acc-img" style="background:${swStyle(lightScopeImgSrc(d),'contain','#fff')}"></span></span></div>`:''}
          ${d.lock?`<div class="row"><span class="k">表示錠</span><span class="v">あり<span class="acc-img" style="background:${swStyle(lockImgSrc(d),'contain','#fff')}"></span></span></div>`:''}
          <div class="note">枠色は建具仕様をご確認ください</div>
        </div>
      </div>
      <div class="tg-card-spec">
        <div class="row"><span class="k">種類</span><span class="v">${esc(d.type)}</span></div>
        <div class="row"><span class="k">品番</span><span class="v">${hinbanColor}</span></div>
        <div class="row"><span class="k">大きさ</span><span class="v">${size}</span></div>
        ${d.remark?`<div class="row"><span class="k">備考①</span><span class="v">${esc(d.remark)}</span></div>`:''}
        ${d.remark1_2?`<div class="row"><span class="k">備考①-2</span><span class="v">${esc(d.remark1_2)}</span></div>`:''}
        ${d.remark2?`<div class="row"><span class="k">備考②</span><span class="v">${esc(d.remark2)}</span></div>`:''}
      </div>
    </div>`;
  };
  // 建具仕様（共通）と床仕様のHTMLは階ごとページ内で再利用するため関数化
  const kvrow=(k,v)=>`<div class="kv"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`;
  const fImg=(img)=> img?`<div style="display:inline-block;width:48px;height:48px;vertical-align:middle;margin-left:8px;border:1px solid #ccc;border-radius:4px;background:${swStyle(img,'cover')}"></div>`:'';
  /* 階名（「1階」「2階」など）から floor key（'1f' or '2f'）に変換 */
  const floorKey = (floorName) => {
    if(!floorName) return '1f';
    if(/^2/.test(floorName)) return '2f';
    return '1f';  // 1階・3階以降などは1F扱い（必要なら拡張）
  };
  const commonHtml = (floorName) => {
    const fk = floorKey(floorName);
    const commonArr = m['common_'+fk] || [];
    let s=`<div class="sec"><div class="sec-h">建具仕様（${esc(floorName||'共通')}）</div><div class="sec-b">`;
    commonArr.forEach(c=>{ if(c.v==='' && !c.note) return; let v=esc(c.v);
      if(c.note) v+=`　※一部変更：${esc(c.note)}`;
      s+=`<div class="kv"><div class="k">${esc(c.k)}</div><div class="v">${v}</div></div>`; });
    s+=`</div></div>`;
    return s;
  };
  const floorSpecHtml = (floorName) => {
    const fk = floorKey(floorName);
    const floorArr = m['floor_'+fk] || [];
    // 床下点検口・床下エアコンは1階のみ印刷に出す（2階以上では非表示）
    const isUpper = floorName && floorName!=='1階';
    let s=`<div class="sec"><div class="sec-h">床仕様（${esc(floorName||'')}）</div><div class="sec-b">`;
    floorArr.forEach(c=>{
      if(isUpper && (c.k==='床下点検口' || c.k==='床下エアコン')) return;
      if(c.k==='畳'){
        const t=[c.type,c.color,c.count].filter(Boolean).map(esc).join('　');
        if(t||c.img) s+=kvrow('畳', t+fImg(c.img));
        return;
      }
      if(WASHITSU_KEYS.includes(c.k)){
        const v=[c.v,c.spec].filter(Boolean).map(esc).join('　');
        if(v) s+=kvrow(c.k,v);
        return;
      }
      if(c.v==='') return;
      let v = c.v==='斜線' ? SLASH_SVG : esc(c.v);
      if(c.k==='フローリング'&&c.pattern) v+=`　（${esc(c.pattern)}）`;
      if(c.k==='フローリング') v+=fImg(c.img);
      if(c.k==='床下点検口'&&TG_INSPECTION_IMG[c.v]) v+=fImg(TG_INSPECTION_IMG[c.v]);
      s+=kvrow(c.k,v);
    });
    s+=`</div></div>`;
    return s;
  };
  // 各階ページの下に出すフッター（ちかさん指定：1F/2F それぞれ別のフォルダに入れるため各階に必要）
  // 注意書きは各階に毎回出すと冗長なので最終階のみに付ける。
  const pageFooter = (isLast) => `
    ${isLast ? `<div class="note" style="margin-top:4mm;">※ 安全性・デザイン性・施工性を優先する場合、仕様詳細図面通りの施工とならない場合がございます。</div>` : ''}
    ${renderProjectFooterHtml(m.meta.title, /*compact*/false)}`;

  // 階ごとに A3横の1ページ：左に[間取り図＋共通仕様＋床仕様]、右に建具カード。
  // 各階の grid の下にそれぞれフッター（タイトル枠）を出す。
  const floors=[...new Set(m.doors.map(d=>d.floor||''))].filter(Boolean);
  floors.forEach((fl,fi)=>{
    const list=m.doors.filter(d=>(d.floor||'')===fl);
    if(!list.length) return;
    const planImg=(m.meta.plan_images||{})[fl]||'';
    const isLast = fi===floors.length-1;
    // 各階を1つの『印刷ページ単位』でラップ。
    // ・tg-print-page を flex column にして A3 縦サイズいっぱい使い、
    //   中身（tg-floor-page）が残りスペースを伸ばして大きく見える
    // ・フッター枠はその最下部に来る（画面の一番下にタイトル枠が固定）
    h+=`<div class="tg-print-page">
      <div class="tg-floor-page">
      <div class="tg-floor-left">
        ${planImg ? `<div class="tg-floor-plan">
          <div class="ph"><span>${esc(fl)}　間取り図</span></div>
          <div class="pbody"><img src="${imgSrc(planImg)}" alt="${esc(fl)}間取り図"></div>
        </div>` : ''}
        ${commonHtml(fl)}
        ${floorSpecHtml(fl)}
      </div>
      <div class="tg-floor-col">
        <div class="tg-floor-title">${esc(fl)}　建具表</div>
        <div class="tg-cards">${list.map(cardHtml).join('')}</div>
      </div>
      </div>
      ${pageFooter(isLast)}
    </div>`;
    // 階の間で確実に改ページ
    if(!isLast){
      h += `<div style="break-after:page;page-break-after:always;height:0;"></div>`;
    }
  });
  // ※ 設計仕様詳細の画像は「入力画面のみ」表示。印刷シートには載せない。
  document.getElementById('sheet').innerHTML=h;
}
