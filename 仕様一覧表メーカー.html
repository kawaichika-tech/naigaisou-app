function krMeta(k,v){ KR.meta[k]=v; sync(); }
/* クロスエントリの編集ハンドラ */
function krRoom(i,k,v){
  KR.rooms[i][k]=v;
  // 階を変えたら並び替えるため再描画
  if(k==='floor'){
    KR.rooms.sort((a,b)=>(a.floor||'').localeCompare(b.floor||'',undefined,{numeric:true}));
    renderEditor(); sync();
    return;
  }
  // 室名（自由入力）はフォーカス保持のため再描画せず保存のみ＋dhead要約だけ部分更新
  if(k==='name'){
    krUpdateRoomHead(i);
    sync();
    return;
  }
  renderEditor(); sync();
}
/* クロス：該当 dcard の dhead 要約だけDOM更新（room/part/style変更時のフォーカス保持） */
function krUpdateRoomHead(i){
  const r = KR.rooms[i];
  const card = [...document.querySelectorAll('#editor .dcard')].find(c=>c.innerHTML.includes(`krRoom(${i},'name'`));
  if(!card) return;
  const dno = card.querySelector('.dhead .dno');
  if(dno){
    dno.textContent = `${r.floor||''}　${r.name||'(室名未入力)'}　${r.part||''}${r.style?'　／　'+r.style:''}`;
  }
}
function krRoomPick(i,input){
  const f=input.files[0]; if(!f) return;
  fileToDataURL(f,1400,durl=>{ KR.rooms[i].img=durl; renderEditor(); sync(); });
  input.value='';
}
function krRoomImgClear(i){ KR.rooms[i].img=''; renderEditor(); sync(); }
function krAddRoom(floor){
  KR.rooms.push({floor:floor||'1階', name:"", part:"壁", style:"", hinban:"", img:""});
  KR.rooms.sort((a,b)=>(a.floor||'').localeCompare(b.floor||'',undefined,{numeric:true}));
  renderEditor(); sync();
}
function krDelRoom(i){ if(confirm('このクロスを削除しますか？')){ KR.rooms.splice(i,1); renderEditor(); sync(); } }
/* 品番カタログから選択：品番＋紐づき画像を自動セット */
function krRoomCatalog(i, hinban){
  KR.rooms[i].hinban = hinban;
  const cat = KR_CATALOG[KR.rooms[i].style] || [];
  const found = cat.find(x=>x.hinban===hinban);
  if(found && found.img) KR.rooms[i].img = found.img; // 画像がカタログに登録されていれば自動セット
  renderEditor(); sync();
}
function krPlanImgPick(floor,input){
  const f=input.files[0]; if(!f) return;
  fileToDataURL(f,2400,durl=>{
    if(!KR.meta.plan_images) KR.meta.plan_images={};
    KR.meta.plan_images[floor]=durl;
    renderEditor(); renderSheet(); sync();

}

  if(KR.meta.plan_images) KR.meta.plan_images[floor]='';

}

function ltMeta(k,v){ LT.meta[k]=v; sync(); }
/* 照明エントリの編集ハンドラ */
/* 全角数字→半角・カンマ/円記号など除去して整数化（IME ON対応） */
function parseJpInt(v){
  if(v==null) return 0;
  const s = String(v)
    .replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))  // ０-９→0-9
    .replace(/[,\s¥￥円]/g, '');
  const n = parseInt(s, 10);
  return isNaN(n) ? 0 : n;
}
function ltSet(i, k, v){
  if(k==='qty')        { LT.entries[i].qty   = Math.max(1, parseJpInt(v)||1); }
  else if(k==='price') { LT.entries[i].price = Math.max(0, parseJpInt(v)); }
  else                 { LT.entries[i][k]    = v; }

  if(k==='qty' || k==='price'){
    // 入力中のフォーカスを保持するため、全体再描画せず該当セルだけDOM更新
    ltUpdateNumericCells(i);
    sync();  // 印刷側＋autosave
    return;
  }
  // 自由入力テキスト（室名・メーカー・備考）はフォーカス保持のため再描画せず保存のみ
  // dheadの要約だけは部分更新して見た目が追従するように
  if(k==='room' || k==='maker' || k==='remark'){
    ltUpdateNumericCells(i);  // dhead要約も併せて更新（内部で dhead を書き換える）
    sync();
    return;
  }
  // 項目（name）変更時：カタログにあれば対応画像を自動セット。
  // ただし📷で取り込んだdata:URIは尊重して上書きしない。
  if(k==='name'){
    const cur = LT.entries[i].img || '';
    const isManual = /^data:/.test(cur);     // 手動取り込み済はそのまま
    if(!isManual){
      const catImg = LT_ITEM_IMG[v];
      if(catImg){
        LT.entries[i].img = catImg;
      } else if(cur && cur.startsWith('照明/')){
        // 自由入力に変わった＆現在の画像は前回の自動セット → クリア
        LT.entries[i].img = '';
      }
    }
  }
  // 階の変更時は並び替え
  if(k==='floor') LT.entries.sort((a,b)=>(a.floor||'').localeCompare(b.floor||'',undefined,{numeric:true}));
  renderEditor(); sync();
}
/* 該当エントリの「総額」セル・dhead要約・上部サマリー（総額/お客様出し）だけを更新 */

function ltPick(i, input){

/* 照明画像URL→Claude VisionへOCRリクエスト用に data:URI 化
   ・data:URIならそのまま
   ・相対パス／HTTPなら <img>+canvas で base64 化（file:// でも動く） */
function ltImgToDataUrl(src){
  return new Promise((resolve, reject)=>{
    if(!src){ reject(new Error('画像が未設定です')); return; }
    if(/^data:/.test(src)){ resolve(src); return; }
    const img = new Image();
    img.onload = ()=>{
      try{
        const cv = document.createElement('canvas');
        cv.width  = img.naturalWidth || 800;
        cv.height = img.naturalHeight || 600;
        cv.getContext('2d').drawImage(img, 0, 0);
        const durl = cv.toDataURL('image/jpeg', 0.85);
        resolve(durl);
      } catch(e){
        const err = new Error('画像のbase64化に失敗: ' + (e.message||e));
        err.imgErr = true;
        reject(err);
      }
    };
    img.onerror = ()=>{
      const err = new Error(`画像が読み込めません（パス・拡張子を確認）：${src}`);
      err.imgErr = true;
      reject(err);
    };
    img.src = src;
  });
}
const LT_OCR_API_URL = `${OCR_HOST}/api/ocr-lighting`;
/* 画像→data:URI 化（Cloud版で imageFile が使えないため）。data: 始まりはそのまま返す */
async function _imgToDataUrl(src){
  if(!src) return '';
  if(/^data:/.test(src)) return src;
  // 相対パスや https URL なら fetch → blob → data:URI
  const url = imgUrl(src);  // IMG_BASE が空ならローカル相対、Cloudなら GitHub Raw
  const resp = await fetch(url);
  if(!resp.ok) throw new Error(`画像取得失敗（${resp.status}）：${url}`);
  const blob = await resp.blob();
  return await new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onload = ()=>resolve(fr.result);
    fr.onerror = ()=>reject(new Error('画像のdata:URI変換に失敗'));
    fr.readAsDataURL(blob);
  });
}
/* 画像ソースに応じて適切なペイロードを作る。
   - ローカル かつ 相対パス → {imageFile: ...} でサーバー側読込（CORS回避）
   - それ以外（data: or Cloud） → {image: data:URI} */
async function ltOcrPriceCore(src){
  let payload;
  if(/^data:/.test(src)){
    payload = {image: src};
  } else if(IMG_BASE){
    // Cloud版：相対パスを data:URI に変換してから送る
    const dataUrl = await _imgToDataUrl(src);
    payload = {image: dataUrl};
  } else {
    // ローカル版：サーバー側ファイル読込に任せる
    payload = {imageFile: src};
  }
  let res;
  try{ res = await fetch(LT_OCR_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
  catch(e){ const err = new Error('AIサーバーに接続できません'); err.noServer = true; throw err; }
  if(!res.ok){ let msg='サーバーエラー '+res.status; try{const j=await res.json(); if(j.error) msg=j.error;}catch(e){} throw new Error(msg); }
  return await res.json();
}
/* 個別エントリの価格をAIで取得 */
async function ltOcrPrice(i){
  const e = LT.entries[i];
  if(!e.img){ alert('まず照明画像を取り込んでください。'); return; }
  const btn = document.getElementById('ltOcrBtn'+i);
  const origText = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = '⏳ AI読み取り中…'; }
  try{
    const out = await ltOcrPriceCore(e.img);
    if(out && typeof out.price === 'number' && out.price > 0){
      LT.entries[i].price = out.price;
      ltUpdateNumericCells(i);
      sync();
      alert(`AI読み取り完了：単価 ¥${out.price.toLocaleString('ja-JP')}${out.note?'（'+out.note+'）':''}${out.hinban?'　／　品番 '+out.hinban:''}`);
    } else {
      alert('価格を読み取れませんでした。画像に「希望小売価格」が明記されていない可能性があります。');
    }
  } catch(err){
    if(err.noServer){
      alert('⚠ AIサーバーに接続できません。\n\n「OCR起動.bat」をダブルクリックして起動し（黒い画面が出たままにする）、もう一度押してください。');
    } else if(err.imgErr){
      alert('⚠ 画像を読み込めませんでした：\n' + err.message + '\n\nファイル名の一致を確認するか、📷で再取り込みしてください。');
    } else {
      alert('AI読み取りに失敗：' + (err.message||err));
    }
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = origText || '📐 価格をAIで取得'; }
  }
}
/* 全エントリの価格を順次AIで取得（既に価格入りはスキップ） */
async function ltOcrPriceAll(){
  const targets = LT.entries.map((e,i)=>({e,i})).filter(x=>x.e.img && (!x.e.price || x.e.price===0));
  if(!targets.length){ alert('対象エントリがありません（画像あり＋単価未入力のものが対象）。'); return; }
  if(!confirm(`画像から価格を一括取得します（${targets.length}件）。AIサーバーが起動している必要があります。続行しますか？`)) return;
  const btn = document.getElementById('ltOcrAllBtn');
  if(btn){ btn.disabled = true; }
  let ok=0, fail=0, noServer=false;
  for(const {e,i} of targets){
    if(btn) btn.textContent = `⏳ AI読み取り中… (${ok+fail+1}/${targets.length})`;
    try{
      const out = await ltOcrPriceCore(e.img);
      if(out && typeof out.price === 'number' && out.price > 0){
        LT.entries[i].price = out.price;
        ltUpdateNumericCells(i);
        ok++;
      } else {
        fail++;
      }
    } catch(err){
      if(err.noServer){ noServer = true; break; }
      fail++;
    }
  }
  sync();
  if(btn){ btn.disabled = false; btn.textContent = '📐 全エントリの価格をAIで一括取得'; }
  if(noServer){
    alert('⚠ AIサーバーに接続できません。\n「OCR起動.bat」をダブルクリックして起動してください。');
  } else {
    alert(`一括取得完了：${ok}件取得${fail?`／${fail}件失敗`:''}`);
  }
  renderEditor();
}

  LT.entries.push({floor:floor||'1階', room:"", maker:"", name:"", qty:1, price:0, img:"", remark:""});

      </div>
    </div>`;
  };

  if(entries.length){
    h += `<div class="lt-floor-title">照明器具一覧（${entries.length}項目／合計${grandQty}個）</div>`;
    h += `<div class="lt-cards">${entries.map(cardHtml).join('')}</div>`;

    h += `<div class="lt-grand">
      <div>

        <div class="lt-grand-yen" style="font-size:16px;color:#555;">${formatYen(grandTotal)}</div>
      </div>

        <div class="lt-grand-label">お客様出し（総額 × ${LT_KAKERITSU}）</div>
        <div class="lt-grand-yen">${formatYen(customerPay)}</div>
      </div>
    </div>`;
  } else {
    h += `<div class="empty" style="padding:30px;color:#999;text-align:center;font-size:13px;border:1px dashed #ccc;border-radius:4px;margin:20px 0;">照明エントリが未登録です。編集画面で「＋ 照明を追加」してください。</div>`;
  }

  // フッター（Excel ライク枠）— 配線表と同じく compact=false で物件名を大きく揃える
  h += `<div class="note" style="margin-top:10px;">${esc(m.meta.note||'')}</div>`;
  h += renderProjectFooterHtml(m.meta.title, /*compact*/false);

  document.getElementById('sheet').innerHTML = h;
}

/* 基本数量追加表の current（現状数量）を更新 ※後方互換のため残す */
function wrItemSet(i, v){
  const s = String(v||'').replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[,\s]/g,'');
  WR.items[i].current = Math.max(0, parseInt(s)||0);
  renderEditor(); sync();
}
/* 計算表：1F/2F/その他 の各セルを更新 → current（現状数量）は自動で合計に
   ※入力中のフォーカスを保持するため、全体再描画せず該当セルだけDOM更新
   group: 'items'(既定) or 'extraItems' */
function wrItemSetFloor(i, field, v, group){
  const grp = (group==='extraItems') ? 'extraItems' : 'items';
  const s = String(v||'').replace(/[０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[,\s]/g,'');
  const n = Math.max(0, parseInt(s)||0);

    WR[grp][i].current = (Number(WR[grp][i].floor1)||0) + (Number(WR[grp][i].floor2)||0) + (Number(WR[grp][i].other)||0);
  }
  wrUpdateItemRow(i, grp);
  wrUpdateGrandTotalRow();
  renderSheet();  // プレビュー側（#sheet）を即時更新。編集パネル側の input フォーカスは別DOMなので保持される
  autosave();
}

/* 該当itemの「合計」「追加個数」「総額」セルを直接更新 */
function wrUpdateItemRow(i, group){
  const grp = (group==='extraItems') ? 'extraItems' : 'items';
  const it = WR[grp][i];
  const total = (Number(it.floor1)||0) + (Number(it.floor2)||0) + (Number(it.other)||0);
  const add   = wrItemAdditional(it);
  const sub   = wrItemSubtotal(it);
  const skip  = it.calc==='skip';
  // 該当行を innerHTML から検索（呼び出しシグネチャでマッチ）
  const sig = grp==='items' ? `wrItemSetFloor(${i},` : `wrItemSetFloor(${i},`;
  const sigGroup = grp==='items' ? `,'items')` : `,'extraItems')`;
  const tr = [...document.querySelectorAll('#editor tr')].find(t=>t.innerHTML.includes(sig) && t.innerHTML.includes(sigGroup));
  if(!tr) return;
  const tds = tr.querySelectorAll('td');
  // 列構成 0:内容 1:備考 2:基本 3:1F 4:2F 5:その他 6:合計 7:工事代金 8:追加 9:総額
  if(tds[6]) tds[6].textContent = String(total);
  if(tds[8]) tds[8].innerHTML = skip ? '-' : `<span style="font-weight:bold;color:${(add||0)>0?'#a26a1f':'#999'};">${add}</span>`;
  if(tds[9]) tds[9].innerHTML = skip ? '-' : `<span style="font-weight:bold;color:${(sub||0)>0?'#1a4a7a':'#999'};">${formatYen(sub)}</span>`;

/* 坪数の根拠資料（画像）取り込み。大きい画像は最大幅1200pxに縮小して data:URI として保存。 */
function wrTsuboImgPick(input){
  const f = input.files && input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 1200;
      const ratio = Math.min(maxW / img.width, 1);
      const cw = Math.round(img.width * ratio);
      const ch = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
      WR.tsubo_image = canvas.toDataURL('image/jpeg', 0.85);
      renderEditor(); renderSheet(); autosave();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
function wrTsuboImgClear(){
  WR.tsubo_image = '';
  renderEditor(); renderSheet(); autosave();
}
function wrSet(k,v){
  if(k==='tsubo'){
    // 全角数字→半角、カンマ・空白除去、小数許可
    const s = String(v||'')
      .replace(/[０-９．]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
      .replace(/[,\s]/g,'');
    WR.tsubo = parseFloat(s) || 0;
    // ★ input のフォーカスを奪わないため renderEditor は呼ばずに印刷シートと自動保存のみ更新。
    //   編集パネル側の関連サマリー（定価/持分/標準個数）は他のフィールド操作 or タブ切替時に
    //   再描画されて反映される。
    renderSheet(); autosave();
    return;
  } else if(k==='base_price'){
    WR.base_price = parseInt(v)||8000;
  } else if(k==='memo'){
    // textareaのフォーカス保持のため再描画せず保存のみ。印刷側は次のレンダリング時に反映
    WR.memo = String(v||'');
    autosave();

  } else {

  }
  renderEditor(); renderSheet(); autosave();
}

  if(Array.isArray(h.floors) && h.floors.length){
    h.plans      = h.floors.map(f=>({label:f.floor||'', img:f.plan_img||''}));
    h.elevations = h.floors.map(f=>({label:f.floor||'', img:f.elev_img||''}));
    h.note       = h.floors.map(f=>f.note||'').filter(Boolean).join('\n');
    delete h.floors;
  }
  if(!Array.isArray(h.sub_walls))  h.sub_walls  = [];
  if(!Array.isArray(h.plans) || h.plans.length===0)           h.plans      = JSON.parse(JSON.stringify(base.plans));
  if(!Array.isArray(h.elevations) || h.elevations.length===0) h.elevations = JSON.parse(JSON.stringify(base.elevations));
  h.sub_walls  = h.sub_walls.map(w=>Object.assign({nm:"", hinban:""}, w));
  h.plans      = h.plans.map(p=>Object.assign({label:"", img:""}, p));
  h.elevations = h.elevations.map(e=>Object.assign({label:"", img:""}, e));
  if(typeof h.note !== 'string') h.note = '';
  if(!Array.isArray(h.note_imgs)) h.note_imgs = [];
  return h;
}
/* 仕様一覧表の外壁セクションから「メイン情報」を抽出。
   ちかさんが手で「メイン」欄に書いた本文（カラー名（仕上げ）　品番）を優先表示。
   無い時のみ variant.nm + 品番 にフォールバック。 */
function getSidingMainInfo(){
  const sec = DATA.sections.find(s=>s.id==='siding');
  if(!sec) return {mainText:"", maker:"", sw:"", munsell:""};
  const v = (sec.decided!=null) ? sec.variants[sec.decided] : null;
  const makerC = sec.common.find(c=>c.k==='メーカー');
  const mainC  = sec.common.find(c=>c.k==='メイン');
  // メイン commons の v を最優先、無ければ variant.nm + 品番 を組み立て
  const fallback = v ? `${v.nm}${v.values["品番"]?'　'+v.values["品番"]:''}` : '';
  return {
    mainText: (mainC && (mainC.v||'').trim()) ? mainC.v : fallback,
    maker:    makerC ? makerC.v : "",
    sw:       v ? v.sw : "",
    munsell:  v ? (v.values["カラー（マンセル値）"]||"") : "",
    // 旧呼び出し互換（必要なら）
    nm:       v ? v.nm : "",
    hinban:   v ? (v.values["品番"]||"") : ""
  };
}
/* 外壁の全候補（仕様一覧表に登録済み）を datalist 用に取得 */
function getSidingVariants(){
  const sec = DATA.sections.find(s=>s.id==='siding');
  return sec ? sec.variants : [];
}

/* 平面図／立面図セクションのレンダリング（共通） */

/* 編集ハンドラ群 */
function hkMeta(k,v){ HK.meta[k]=v; sync(); }
function hkSetNote(v){ HK.note = String(v||''); renderSheet(); autosave(); }
function hkAddNoteImg(input){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  let remain = files.length;
  files.forEach(f=>{
    fileToDataURL(f, 1800, durl=>{
      if(!Array.isArray(HK.note_imgs)) HK.note_imgs = [];
      HK.note_imgs.push(durl);
      remain--;
      if(remain===0){ renderEditor(); sync(); }
    });
  });
  input.value='';
}
function hkDelNoteImg(i){
  if(!Array.isArray(HK.note_imgs)) return;
  HK.note_imgs.splice(i,1);
  renderEditor(); sync();
}
function hkAddSubWall(){ HK.sub_walls.push({nm:'', hinban:''}); renderEditor(); sync(); }
function hkDelSubWall(i){ HK.sub_walls.splice(i,1); renderEditor(); sync(); }
function hkSetSubWall(i,k,v){
  HK.sub_walls[i][k] = String(v||'');
  // フォーカス保持：行内の色チップだけ更新
  const variants = getSidingVariants();
  const w = HK.sub_walls[i];
  const matched = variants.find(x=>x.nm===w.nm) || variants.find(x=>(x.values['品番']||'')===w.hinban);
  const sw = matched ? matched.sw : '';
  const rows = document.querySelectorAll('#editor div[style*="grid-template-columns:auto 1fr 1fr auto"]');
  const row = rows[i];
  if(row){
    const chip = row.querySelector('div');
    if(chip) chip.style.background = swStyle(sw, 'cover');
  }
  renderSheet(); autosave();
}
function hkAddImgItem(key){
  const arr = HK[key];
  let label = '';
  if(key==='elevations'){
    // 立面図：北→東→南→西 の順で未使用のラベルを次の候補に
    const directions = ['北','東','南','西','北東','南東','南西','北西'];
    label = directions.find(d=>!arr.some(x=>x.label===d)) || '';
  } else {
    // 平面図：次の階番号
    label = `${arr.length + 1}階`;
  }
  arr.push({label, img:''});
  renderEditor(); sync();
}
function hkDelImgItem(key,i){
  if(HK[key].length<=1) return;
  if(!confirm('この階を削除します。よろしいですか？')) return;
  HK[key].splice(i,1);
  renderEditor(); sync();
}
function hkSetImgItem(key,i,field,v){
  HK[key][i][field] = String(v||'');
  if(field==='label'){ renderSheet(); autosave(); return; }
  renderEditor(); sync();
}
function hkPickImgItem(key,i,input){
  const f=input.files[0]; if(!f) return;
  fileToDataURL(f, 1800, durl=>{ HK[key][i].img=durl; renderEditor(); sync(); });
  input.value='';
}
function hkClearImgItem(key,i){ HK[key][i].img=''; renderEditor(); sync(); }

/* 印刷シート（A3横、1ページに全部入る構成）
   ヘッダー＋外壁メイン＋貼り分け外壁リスト＋平面図（横並び）＋立面図（横並び）＋メモ＋フッター */
function renderHarimakeSheet(){
  const p = DATA.project, m = HK;
  const mi = getSidingMainInfo();
  const variants = getSidingVariants();
  let h = '';

  // ちかさん指定：上部ヘッダー廃止。物件名・図面名は下のフッター枠に集約。

  // 外壁メイン（カラー名／品番／メーカー すべて太字 14px・画像は 50x50 正方形 contain・1行表示）
  h += `<div style="margin-top:6px;border:1px solid #888;border-radius:4px;padding:6px 10px;display:grid;grid-template-columns:80px 50px 1fr;gap:6px 12px;font-size:12px;align-items:center;background:#f6f8fa;">

  const hasNote = (m.note||'').trim();
  const noteImgs = Array.isArray(m.note_imgs) ? m.note_imgs : [];
  if(hasNote || noteImgs.length){
    // 画像セル（複数枚は横並び・無いなら空セル）
    let imgsCell = '<div></div>';
    if(noteImgs.length){
      imgsCell = `<div style="display:flex;gap:4px;flex-wrap:wrap;">`

      </div>`;

  // 貼り分け外壁（追加分）
  if(m.sub_walls.length){
    h += `<div style="margin-top:4mm;border:1px solid #888;border-radius:4px;padding:6px 10px;background:#f6faf2;">
        <div style="font-weight:bold;color:#3a7a17;font-size:12px;margin-bottom:4px;">🎨 貼り分けで使う外壁（${m.sub_walls.length}件）</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:4px 10px;font-size:12px;">`;
    m.sub_walls.forEach(w=>{
      const matched = variants.find(v=>v.nm===w.nm) || variants.find(v=>(v.values['品番']||'')===w.hinban);
      const sw = matched ? matched.sw : '';
      // カラー名（仕上げ込み）と品番の両方を太字で表示
      h += `<div style="display:grid;grid-template-columns:38px 1fr;gap:6px;align-items:center;">
          <div style="height:30px;border-radius:3px;border:1px solid #00000022;background:${swStyle(sw,'cover')};"></div>
          <div><b>${esc(w.nm||'-')}</b>${w.hinban?`　<b>${esc(w.hinban)}</b>`:''}</div>
        </div>`;
    });
    h += `</div></div>`;
  }

  // 平面図と立面図を2カラムレイアウト：左=平面図（縦並び）、右=立面図
  // A3横1ページにフッター込みで収まる範囲で、余白を減らして画像を最大化。
  const plans = m.plans || [];
  const elevs = m.elevations || [];
  // 平面：1階2階なら大きめに（縦に積む、余白活用）
  const planH = plans.length <= 2 ? 78 : Math.max(48, Math.floor(170 / plans.length));
  // 立面：実物の立面図は横長（高さ:幅 ≒ 1:3）。2行なら余裕あるので大きく。
  const elevCols = elevs.length <= 4 ? 2 : 3;
  const elevRows = Math.ceil(elevs.length / elevCols);
  const elevH = elevRows === 1 ? 95 : (elevRows === 2 ? 72 : Math.max(45, Math.floor(165 / elevRows)));

  h += `<div style="display:grid;grid-template-columns:1fr 2fr;gap:5mm;margin-top:4mm;align-items:start;">`;

  h += `<div>
      <div style="background:#3b4a5c;color:#fff;font-weight:bold;font-size:12px;padding:3px 10px;border-radius:3px;">🏢 立面図</div>
      <div style="display:grid;grid-template-columns:repeat(${elevCols},1fr);gap:2mm 3mm;margin-top:2mm;">`;
  elevs.forEach(it=>{
    h += `<div>
        <div style="text-align:center;font-size:10.5px;color:#555;font-weight:bold;margin-bottom:0.5mm;">${esc(it.label||'')}</div>
        <div style="border:1px solid #888;height:${elevH}mm;background:${swStyle(it.img,'contain','#fff')};border-radius:3px;"></div>
      </div>`;
  });
  h += `</div></div>`;

  h += `</div>`; // /grid 2カラム

  // フッター（Excel ライク枠）
  h += renderProjectFooterHtml(m.meta.title, /*compact*/false);

  document.getElementById('sheet').innerHTML = h;
}
/* 平面/立面 セクション（複数階を横並び）の印刷HTML生成
   項目数に応じて列数を動的に変える（半端な折り返しを避けるため）。
   多くなったら自動で画像高さを縮めて A3横1ページに収まるように。 */
function renderImgSection(title, items, bgColor){
  if(!items || !items.length) return '';
  const n = items.length;
  // 列数：6以上は2段に折り返す（3列）。5以下は項目数ぴったり。
  const cols = (n >= 6) ? 3 : n;
  // 画像高さ：列数が多いほど縦を縮める（A3横全体に収まるため）
  const imgH = (n <= 2) ? 95 : (n === 3) ? 85 : (n === 4) ? 75 : (n === 5) ? 60 : 55;
  let h = `<div style="margin-top:5mm;">
      <div style="background:${bgColor};color:#fff;font-weight:bold;font-size:13px;padding:3px 10px;border-radius:3px;">${title}</div>
      <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:3mm;margin-top:2mm;">`;
  items.forEach(it=>{
    h += `<div>
        <div style="text-align:center;font-size:11px;color:#555;font-weight:bold;margin-bottom:1mm;">${esc(it.label||'')}</div>
        <div style="border:1px solid #888;height:${imgH}mm;background:${swStyle(it.img,'contain','#fff')};border-radius:3px;"></div>
      </div>`;
  });
  h += `</div></div>`;
  return h;
}

/* #sheet に書類ごとの専用モードクラスを排他的に付与する。
   各図面のCSSはこのモードクラスにスコープされているため、ある図面の調整が
   他の図面に波及しなくなる（旧 tg-mode の共有による干渉を解消）。 */
const SHEET_MODE_MAP = {
  spec:'spec-mode', tategu:'tategu-mode', kurosu:'kurosu-mode',
  lighting:'lighting-mode', wiring:'wiring-mode', harimake:'harimake-mode'
};
function setSheetMode(d){
  const sheet = document.getElementById('sheet');
  Object.values(SHEET_MODE_MAP).forEach(c => sheet.classList.remove(c));
  sheet.classList.add(SHEET_MODE_MAP[d] || 'spec-mode');
}

/* 書類切り替え（仕様一覧表 ⇔ 建具表 ⇔ クロス図面 ⇔ 照明図面 ⇔ 配線数量表 ⇔ 貼り分け図面） */
function switchDoc(d){
  DOC=d;
  document.getElementById('docSpec').classList.toggle('active',d==='spec');
  document.getElementById('docTategu').classList.toggle('active',d==='tategu');
  document.getElementById('docKurosu').classList.toggle('active',d==='kurosu');
  document.getElementById('docLighting').classList.toggle('active',d==='lighting');
  document.getElementById('docWiring').classList.toggle('active',d==='wiring');
  document.getElementById('docHarimake').classList.toggle('active',d==='harimake');
  // チェック用印刷ボタンは配線数量表タブの時だけ表示
  const btnCheck = document.getElementById('btnPrintCheck');
  if(btnCheck) btnCheck.style.display = (d==='wiring') ? '' : 'none';
  document.getElementById('h1title').textContent =
    d==='tategu'   ? '🚪 建具・床図面メーカー' :
    d==='kurosu'   ? '🎨 クロス図面メーカー' :
    d==='lighting' ? '💡 照明図面メーカー' :
    d==='wiring'   ? '⚡ 配線数量表メーカー' :
    d==='harimake' ? '🧱 外壁貼り分け図面メーカー' :
                     '📋 外部・内部仕様一覧表メーカー';
  // 各図面ごとに独立したモードクラスを付与（CSSのスコープを完全分離して相互干渉を防ぐ）
  setSheetMode(d);
  renderEditor(); renderSheet(); window.scrollTo(0,0);
}

/* 保存・読込（1物件＝仕様一覧表＋建具表をまとめて1ファイル） */
/* ============================================================
   物件プルダウン切替（ブラウザ内 localStorage で複数物件を管理）
   - PROJECTS_KEY 配下に { 物件名: {spec,tategu,kurosu,lighting,wiring,harimake} } を保存
   - CURRENT_PROJECT_KEY に現在編集中の物件名を保存（autosave 時にも上書き）
   - PC間共有は不要（各人が自分のPCで完結）。共有したい時は既存の JSON書出/読込を使う。
   ============================================================ */
const PROJECTS_KEY = 'naigaisou_projects_v1';
const CURRENT_PROJECT_KEY = 'naigaisou_current_project_v1';

function loadProjectList(){
  try{ return JSON.parse(localStorage.getItem(PROJECTS_KEY)||'{}') || {}; }catch(e){ return {}; }
}
function saveProjectList(list){
  try{ localStorage.setItem(PROJECTS_KEY, JSON.stringify(list)); }
  catch(e){ alert('物件データの保存に失敗しました（容量上限の可能性）。取り込み画像が多い物件は JSON書出でファイル化してください。'); }
}
function getCurrentProjectName(){ return localStorage.getItem(CURRENT_PROJECT_KEY) || ''; }
function setCurrentProjectName(name){
  if(name) localStorage.setItem(CURRENT_PROJECT_KEY, name);
  else localStorage.removeItem(CURRENT_PROJECT_KEY);
}

/* プルダウンを最新化。現在の物件名があれば選択状態にする */
function refreshProjectDropdown(){
  const sel = document.getElementById('projectSelect');
  if(!sel) return;
  const list = loadProjectList();
  const current = getCurrentProjectName();
  const names = Object.keys(list).sort();
  sel.innerHTML = '<option value="">（選択…）</option>'
    + names.map(n=>`<option value="${esc(n)}"${n===current?' selected':''}>${esc(n)}</option>`).join('');
}

/* プルダウン変更時：選ばれた物件を読み込んで即切替 */
function switchProject(name){
  if(!name){ setCurrentProjectName(''); return; }
  const list = loadProjectList();
  const proj = list[name];
  if(!proj){ alert('物件データが見つかりません：'+name); refreshProjectDropdown(); return; }
  DATA = mergeWithMaster(proj.spec);
  TG   = normalizeTG(proj.tategu);
  KR   = normalizeKR(proj.kurosu);
  LT   = normalizeLT(proj.lighting);
  WR   = normalizeWR(proj.wiring);
  HK   = normalizeHK(proj.harimake);
  setCurrentProjectName(name);
  renderEditor();
  renderSheet();
  autosave();
  window.scrollTo(0,0);
}

/* 現在のデータに名前を付けて保存（既に同名があれば上書き確認） */
function saveProjectAs(){
  const suggested = getCurrentProjectName() || (DATA && DATA.project && DATA.project.name) || '';
  const name = prompt('物件名を入力してください：', suggested);
  if(!name || !name.trim()) return;
  const trimmed = name.trim();
  const list = loadProjectList();
  if(list[trimmed] && trimmed !== getCurrentProjectName()){
    if(!confirm(`「${trimmed}」は既に存在します。上書きしますか？`)) return;
  }
  list[trimmed] = {
    spec:     DATA,
    tategu:   TG,
    kurosu:   KR,
    lighting: LT,
    wiring:   WR,
    harimake: HK,
    savedAt:  new Date().toISOString()
  };
  saveProjectList(list);
  setCurrentProjectName(trimmed);
  refreshProjectDropdown();
  alert(`保存しました：${trimmed}`);
}

/* プルダウンで選択中の物件を削除 */
function deleteProject(){
  const sel = document.getElementById('projectSelect');
  const name = sel ? sel.value : '';
  if(!name){ alert('削除する物件をプルダウンで選択してください。'); return; }
  if(!confirm(`「${name}」を削除します。よろしいですか？\n（この物件の localStorage 内データが消えます。JSON書出でバックアップ済みなら復元可能です）`)) return;
  const list = loadProjectList();
  delete list[name];
  saveProjectList(list);
  if(getCurrentProjectName() === name) setCurrentProjectName('');
  refreshProjectDropdown();
  alert(`削除しました：${name}`);
}

function saveJson(){
  const out={ _type:"naigaisou", spec:DATA, tategu:TG, kurosu:KR, lighting:LT, wiring:WR, harimake:HK };
  const blob = new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(DATA.project.name||'仕様書').replace(/[\\/:*?"<>|]/g,'_')+'.json';
  a.click();
}
function loadJson(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const obj=JSON.parse(r.result);
    if(obj && obj._type==='naigaisou'){
      DATA=mergeWithMaster(obj.spec);
      TG=normalizeTG(obj.tategu);
      KR=normalizeKR(obj.kurosu);     // 旧ファイル（kurosu無し）はマスタから初期化
      LT=normalizeLT(obj.lighting);   // 旧ファイル（lighting無し）はマスタから初期化
      WR=normalizeWR(obj.wiring);     // 旧ファイル（wiring無し）はマスタから初期化
      HK=normalizeHK(obj.harimake);   // 旧ファイル（harimake無し）はマスタから初期化
    }
    else { DATA=mergeWithMaster(obj); } // 旧形式（仕様一覧表のみ）
    // JSON 読込は『新しい物件を持ち込んだ』動作なので、プルダウンの選択は解除
    setCurrentProjectName('');
    refreshProjectDropdown();
    renderEditor(); renderSheet(); autosave(); alert('読み込みました。名前を付けて保存すれば物件プルダウンに登録されます。');
  }catch(e){ alert('読み込めませんでした：'+e); } };
  r.readAsText(f); ev.target.value='';
}
function resetProject(){
  DATA=JSON.parse(JSON.stringify(MASTER));
  TG=JSON.parse(JSON.stringify(TATEGU_MASTER));
  KR=JSON.parse(JSON.stringify(KUROSU_MASTER));
  LT=JSON.parse(JSON.stringify(LIGHTING_MASTER));
  WR=JSON.parse(JSON.stringify(WIRING_MASTER));
  HK=JSON.parse(JSON.stringify(HARIMAKE_MASTER));
  // 新規＝現在の物件から離脱。プルダウン選択も解除
  setCurrentProjectName('');
  refreshProjectDropdown();
  renderEditor(); renderSheet(); autosave();
}

/* 廃番DB（同フォルダ 廃番DB.json）を起動時に読み込み。失敗してもアプリは動作。 */
let HAIBAN_DB = { products:{}, updated:"" };
function normalizeHinban(code){ return String(code||'').replace(/_/g,'-'); }
function getHaibanInfo(code){ return HAIBAN_DB.products[normalizeHinban(code)] || null; }
function loadHaibanDb(){
  return fetch('廃番DB.json').then(r=>r.ok?r.json():null).then(j=>{
    if(j && j.products){ HAIBAN_DB = j; console.log(`廃番DB読込：${Object.keys(j.products).length}品番（${j.updated}）`); }
  }).catch(e=>{ console.warn('廃番DB読込スキップ（ファイルなし or 起動条件）:', e); });
}

loadLocal();
setSheetMode(DOC); // 初期表示でも各図面ごとの独立モードクラスを付与
{ const _b=document.getElementById('btnPrintCheck'); if(_b) _b.style.display=(DOC==='wiring')?'':'none'; }
