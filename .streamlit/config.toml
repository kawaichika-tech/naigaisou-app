# Streamlit 設定ファイル
# 詳細: https://docs.streamlit.io/library/advanced-features/configuration

[server]
# ローカル開発時のポート（デフォルト 8501）
port = 8501
# Streamlit Cloud では必ず true。ローカルでブラウザ自動起動したいときは
# `streamlit run streamlit_app.py --server.headless=false` のようにCLIで上書き
headless = true

[browser]
# 使用統計の送信を無効化
gatherUsageStats = false

[theme]
# ライトテーマ
base = "light"
